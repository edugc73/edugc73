<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Comercial Fitwear</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        :root {
            --bg-color: #0a192f;
            --card-bg: #112240;
            --text-main: #e6f1ff;
            --accent: #64ffda;
            --highlight: #f06292;
            --blue-vibrant: #00d2ff;
            --success: #4caf50;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-weight: 300;
            letter-spacing: 2px;
            color: var(--accent);
            text-transform: uppercase;
        }

        .stats-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 10px 30px -15px rgba(2,12,27,0.7);
            text-align: center;
            border-bottom: 3px solid var(--blue-vibrant);
            transition: transform 0.3s;
        }

        .card:hover { transform: translateY(-5px); }

        .card h3 { font-size: 0.85rem; color: #8892b0; margin: 0; text-transform: uppercase; }
        .card p { font-size: 1.6rem; font-weight: bold; margin: 12px 0 0; color: var(--text-main); }
        .card .sub-value { color: var(--accent); font-size: 1.1rem; display: block; margin-top: 5px; }

        .charts-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(450px, 1fr));
            gap: 20px;
        }

        .chart-box {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 12px;
            min-height: 400px;
        }

        @media (max-width: 600px) {
            .charts-container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Dashboard de Vendas & Estoque</h1>
        <p>Análise em tempo real dos dados do Google Sheets</p>
    </div>

    <div class="stats-container">
        <div class="card">
            <h3>Total Faturado</h3>
            <p id="total-faturado">R$ 0,00</p>
        </div>
        <div class="card">
            <h3>Peça Mais Vendida</h3>
            <p id="peca-mais-vendida">-</p>
            <span class="sub-value" id="qtd-mais-vendida">0 unidades</span>
        </div>
        <div class="card">
            <h3>Estoque Atual (Custo)</h3>
            <p id="total-investido">R$ 0,00</p>
        </div>
        <div class="card">
            <h3>Total de Peças Vendidas</h3>
            <p id="total-pecas-vendidas">0</p>
        </div>
    </div>

    <div class="charts-container">
        <div class="chart-box">
            <canvas id="chartEstoque"></canvas>
        </div>
        <div class="chart-box">
            <canvas id="chartVendas"></canvas>
        </div>
    </div>

    <script>
        // SUBSTITUA PELO SEU LINK CSV DO GOOGLE SHEETS
        const sheetUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQzZH_Y2vjYIClUKSeVBVdfvx8y4b81c66zJoc-wnLbM-mza5hRP-sPPuaQhTloew/pubhtml?gid=1503843495&single=true';

        async function initDashboard() {
            Papa.parse(sheetUrl, {
                download: true,
                header: true,
                dynamicTyping: true,
                complete: function(results) {
                    processDashboardData(results.data);
                }
            });
        }

        function processDashboardData(data) {
            let totalFaturado = 0;
            let totalCustoEstoque = 0;
            let totalPecasVendidas = 0;
            
            let estoquePorProduto = {};
            let vendasPorProduto = {};

            data.forEach(row => {
                if(!row.PRODUTO) return;

                const qtdVendida = row['QTDE VENDIDA'] || 0;
                const valorVenda = row['VALOR DE VENDA'] || 0;
                const valorCompra = row['VALOR DA COMPRA'] || 0;
                const estoqueAtual = row['ESTOQUE'] || 0;

                // 1. Cálculos de Faturamento e Custos
                totalFaturado += (qtdVendida * valorVenda);
                totalCustoEstoque += (estoqueAtual * valorCompra);
                totalPecasVendidas += qtdVendida;

                // 2. Agrupamentos para Gráficos
                estoquePorProduto[row.PRODUTO] = (estoquePorProduto[row.PRODUTO] || 0) + estoqueAtual;
                vendasPorProduto[row.PRODUTO] = (vendasPorProduto[row.PRODUTO] || 0) + qtdVendida;
            });

            // Encontrar peça mais vendida
            let topPeca = Object.keys(vendasPorProduto).reduce((a, b) => vendasPorProduto[a] > vendasPorProduto[b] ? a : b, "-");

            // Atualizar Interface
            document.getElementById('total-faturado').innerText = `R$ ${totalFaturado.toLocaleString('pt-BR', {minimumFractionDigits: 2})}`;
            document.getElementById('total-investido').innerText = `R$ ${totalCustoEstoque.toLocaleString('pt-BR', {minimumFractionDigits: 2})}`;
            document.getElementById('total-pecas-vendidas').innerText = totalPecasVendidas;
            document.getElementById('peca-mais-vendida').innerText = topPeca;
            document.getElementById('qtd-mais-vendida').innerText = `${vendasPorProduto[topPeca] || 0} unidades`;

            renderCharts(estoquePorProduto, vendasPorProduto);
        }

        function renderCharts(estoqueData, vendasData) {
            const chartOptions = {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { labels: { color: '#8892b0', font: { size: 12 } } }
                },
                scales: {
                    y: { grid: { color: '#233554' }, ticks: { color: '#8892b0' } },
                    x: { grid: { display: false }, ticks: { color: '#8892b0' } }
                }
            };

            // Gráfico 1: Disponibilidade em Estoque
            new Chart(document.getElementById('chartEstoque'), {
                type: 'bar',
                data: {
                    labels: Object.keys(estoqueData),
                    datasets: [{
                        label: 'Itens em Estoque',
                        data: Object.values(estoqueData),
                        backgroundColor: '#00d2ff',
                        hoverBackgroundColor: '#64ffda'
                    }]
                },
                options: { ...chartOptions, plugins: { title: { display: true, text: 'DISPONIBILIDADE EM ESTOQUE', color: '#64ffda', font: { size: 16 } } } }
            });

            // Gráfico 2: Performance de Vendas (Peças Vendidas)
            new Chart(document.getElementById('chartVendas'), {
                type: 'line',
                data: {
                    labels: Object.keys(vendasData),
                    datasets: [{
                        label: 'Total de Vendas',
                        data: Object.values(vendasData),
                        borderColor: '#f06292',
                        backgroundColor: 'rgba(240, 98, 146, 0.2)',
                        fill: true,
                        tension: 0.4,
                        pointRadius: 6,
                        pointBackgroundColor: '#f06292'
                    }]
                },
                options: { ...chartOptions, plugins: { title: { display: true, text: 'PEÇAS VENDIDAS POR MODELO', color: '#f06292', font: { size: 16 } } } }
            });
        }

        initDashboard();
    </script>
</body>
</html>
