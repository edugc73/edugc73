<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Fitwear Live</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        :root {
            --bg-color: #0a192f;
            --card-bg: #112240;
            --text-main: #e6f1ff;
            --accent: #64ffda;
            --highlight: #f06292;
            --blue-vibrant: #00d2ff;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-weight: 300;
            letter-spacing: 2px;
            color: var(--accent);
            text-transform: uppercase;
        }

        .stats-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 10px 30px -15px rgba(2,12,27,0.7);
            text-align: center;
            border-bottom: 3px solid var(--blue-vibrant);
        }

        .card h3 { font-size: 0.85rem; color: #8892b0; margin: 0; text-transform: uppercase; }
        .card p { font-size: 1.6rem; font-weight: bold; margin: 12px 0 0; color: var(--text-main); }
        .card .sub-value { color: var(--highlight); font-size: 1rem; display: block; margin-top: 5px; }

        .charts-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(450px, 1fr));
            gap: 20px;
        }

        .chart-box {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 12px;
            min-height: 400px;
        }

        @media (max-width: 600px) {
            .charts-container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>CBFITWEAR PERFORMANCE</h1>
        <p>Dados sincronizados do Google Sheets</p>
    </div>

    <div class="stats-container">
        <div class="card">
            <h3>Total Faturado</h3>
            <p id="total-faturado">R$ 0,00</p>
        </div>
        <div class="card">
            <h3>Peça Mais Vendida</h3>
            <p id="peca-mais-vendida">-</p>
            <span class="sub-value" id="qtd-mais-vendida">0 unidades</span>
        </div>
        <div class="card">
            <h3>Estoque Atual (Custo)</h3>
            <p id="total-investido">R$ 0,00</p>
        </div>
        <div class="card">
            <h3>Total de Peças Vendidas</h3>
            <p id="total-pecas-vendidas">0</p>
        </div>
    </div>

    <div class="charts-container">
        <div class="chart-box">
            <canvas id="chartEstoque"></canvas>
        </div>
        <div class="chart-box">
            <canvas id="chartVendas"></canvas>
        </div>
    </div>

    <script>
        const sheetUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQzZH_Y2vjYIClUKSeVBVdfvx8y4b81c66zJoc-wnLbM-mza5hRP-sPPuaQhTloew/pub?gid=1503843495&single=true&output=csv';

        function init() {
            Papa.parse(sheetUrl, {
                download: true,
                header: true,
                dynamicTyping: true,
                skipEmptyLines: true,
                complete: function(results) {
                    renderDashboard(results.data);
                }
            });
        }

        function renderDashboard(data) {
            let faturamento = 0;
            let custoEstoque = 0;
            let totalVendidas = 0;
            let estoqueMap = {};
            let vendasMap = {};

            data.forEach(row => {
                if (!row.PRODUTO) return;

                // Tratamento de valores para garantir que sejam números
                const qVendida = parseFloat(String(row['QTDE VENDIDA']).replace(',', '.')) || 0;
                const vVenda = parseFloat(String(row['VALOR DE VENDA']).replace(',', '.')) || 0;
                const vCompra = parseFloat(String(row['VALOR DA COMPRA']).replace(',', '.')) || 0;
                const estAtual = parseFloat(String(row['ESTOQUE']).replace(',', '.')) || 0;

                faturamento += (qVendida * vVenda);
                custoEstoque += (estAtual * vCompra);
                totalVendidas += qVendida;

                estoqueMap[row.PRODUTO] = (estoqueMap[row.PRODUTO] || 0) + estAtual;
                vendasMap[row.PRODUTO] = (vendasMap[row.PRODUTO] || 0) + qVendida;
            });

            // Lógica para Peça Mais Vendida
            const topPeca = Object.keys(vendasMap).reduce((a, b) => vendasMap[a] > vendasMap[b] ? a : b, "Nenhuma");

            // Atualização dos Cards
            document.getElementById('total-faturado').innerText = `R$ ${faturamento.toLocaleString('pt-BR', {minimumFractionDigits: 2})}`;
            document.getElementById('total-investido').innerText = `R$ ${custoEstoque.toLocaleString('pt-BR', {minimumFractionDigits: 2})}`;
            document.getElementById('total-pecas-vendidas').innerText = totalVendidas;
            document.getElementById('peca-mais-vendida').innerText = topPeca;
            document.getElementById('qtd-mais-vendida').innerText = `${vendasMap[topPeca] || 0} unidades`;

            createCharts(estoqueMap, vendasMap);
        }

        function createCharts(estMap, vendMap) {
            const commonOptions = {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    y: { grid: { color: '#1d2d44' }, ticks: { color: '#8892b0' } },
                    x: { ticks: { color: '#8892b0' } }
                },
                plugins: { legend: { labels: { color: '#e6f1ff' } } }
            };

            // Gráfico de Barras - Estoque
            new Chart(document.getElementById('chartEstoque'), {
                type: 'bar',
                data: {
                    labels: Object.keys(estMap),
                    datasets: [{
                        label: 'Qtd em Estoque',
                        data: Object.values(estMap),
                        backgroundColor: '#00d2ff'
                    }]
                },
                options: { ...commonOptions, plugins: { title: { display: true, text: 'NÍVEL DE ESTOQUE ATUAL', color: '#64ffda' } } }
            });

            // Gráfico de Linha - Vendas
            new Chart(document.getElementById('chartVendas'), {
                type: 'line',
                data: {
                    labels: Object.keys(vendMap),
                    datasets: [{
                        label: 'Unidades Vendidas',
                        data: Object.values(vendMap),
                        borderColor: '#f06292',
                        backgroundColor: 'rgba(240, 98, 146, 0.1)',
                        fill: true,
                        tension: 0.3,
                        pointRadius: 5
                    }]
                },
                options: { ...commonOptions, plugins: { title: { display: true, text: 'PERFORMANCE DE VENDAS POR ITEM', color: '#f06292' } } }
            });
        }

        init();
    </script>
</body>
</html>
