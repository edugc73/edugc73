<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard de Dividendos Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent-color: #38bdf8;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --success: #10b981;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 1100px;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        header h1 {
            font-weight: 600;
            letter-spacing: -1px;
            margin-bottom: 5px;
        }

        header p {
            color: var(--text-dim);
        }

        /* Controles */
        .controls {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-size: 0.85rem;
            color: var(--accent-color);
            font-weight: 600;
            text-transform: uppercase;
        }

        select {
            background: var(--card-bg);
            border: 1px solid #334155;
            color: white;
            padding: 12px;
            border-radius: 8px;
            outline: none;
            cursor: pointer;
            transition: border-color 0.3s;
        }

        select:focus {
            border-color: var(--accent-color);
        }

        /* Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 16px;
            border: 1px solid #334155;
            text-align: center;
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card h3 {
            margin: 0;
            font-size: 0.8rem;
            color: var(--text-dim);
            text-transform: uppercase;
        }

        .card .value {
            font-size: 1.8rem;
            font-weight: 600;
            margin-top: 10px;
            color: var(--accent-color);
        }

        /* Gráfico */
        .chart-container {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 16px;
            border: 1px solid #334155;
            height: 400px;
        }

        .loading {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--accent-color);
            color: var(--bg-color);
            padding: 10px 20px;
            border-radius: 50px;
            font-weight: 600;
            display: none;
        }
    </style>
</head>
<body>

<div id="loading" class="loading">Sincronizando Dados...</div>

<div class="container">
    <header>
        <h1>Dividendos do Gonça</h1>
        <p>Análise de proventos da carteira FII</p>
    </header>

    <div class="controls">
        <div class="control-group">
            <label>Selecione o Ativo</label>
            <select id="selectAtivo" onchange="updateDashboard()"></select>
        </div>
        <div class="control-group">
            <label>Mês de Referência</label>
            <select id="selectMes" onchange="updateDashboard()"></select>
        </div>
    </div>

    <div class="stats-grid">
        <div class="card">
            <h3>Cotas Acumuladas</h3>
            <div id="valCotas" class="value">0</div>
        </div>
        <div class="card">
            <h3>Rendimento p/ Cota</h3>
            <div id="valRendimento" class="value">R$ 0,00</div>
        </div>
        <div class="card">
            <h3>Total no Mês</h3>
            <div id="valTotal" class="value">R$ 0,00</div>
        </div>
        <div class="card">
            <h3>Yield on Cost</h3>
            <div id="valYOC" class="value">0,00%</div>
        </div>
    </div>

    <div class="chart-container">
        <canvas id="myChart"></canvas>
    </div>
</div>

<script>
    let rawData = [];
    let chartInstance = null;

    async function fetchData() {
        const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTJFWclSmOeIDQwo5VepSJ5_XG-t-0OVr4FhWsVlmUA4t5wEk-bjTbZdOD1cXGcGnnZ6IBm2vGVZ8HQ/pub?gid=1980124587&single=true&output=csv";
        try {
            const response = await fetch(sheetURL);
            const text = await response.text();
            const rows = text.split('\n').map(row => row.split(','));
            
            rawData = rows.slice(1).map(row => ({
                0: row[0], 1: row[1], 2: row[2], 3: row[3], 4: row[4], 5: row[5]
            }));

            populateFilters();
            updateDashboard(); // Agora ela será encontrada
        } catch (e) {
            console.error("Erro ao carregar dados:", e);
        }
    }

    function populateFilters() {
        const ativos = [...new Set(rawData.map(d => d[0]))].filter(Boolean).sort();
        const meses = [...new Set(rawData.map(d => d[1]))].filter(Boolean);

        document.getElementById('selectAtivo').innerHTML = ativos.map(a => `<option value="${a}">${a}</option>`).join('');
        document.getElementById('selectMes').innerHTML = meses.map(m => `<option value="${m}">${m}</option>`).join('');
    }

    function parseNumber(val) {
        if (!val) return 0;
        let clean = String(val).replace(/[R$\s%]/g, '').replace(',', '.');
        return parseFloat(clean) || 0;
    }

    // FUNÇÃO AGORA FORA DA FETCHDATA PARA SER GLOBAL
    function updateDashboard() {
        const selAtivo = document.getElementById('selectAtivo');
        const selMes = document.getElementById('selectMes');

        if (!selAtivo || !selMes || rawData.length === 0) return;

        const valAtivo = selAtivo.value;
        const valMes = selMes.value;

        const historico = rawData.filter(d => String(d[0]).trim() === valAtivo);
        const dados = historico.find(d => String(d[1]).trim() === valMes) || {};

        // Mapeamento correto das colunas do seu CSV
        const nCotas = parseNumber(dados[2]);
        const nRendimento = parseNumber(dados[3]);
        let nYOC = parseNumber(dados[4]);
        const nTotal = parseNumber(dados[5]);

        if (nYOC > 0 && nYOC < 1) nYOC *= 100;

        const fR$ = (n) => n.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });

        // Atualiza os IDs que estão nos seus cards (valCotas, valRendimento, valTotal, valYOC)
        document.getElementById('valCotas').innerText = nCotas;
        document.getElementById('valRendimento').innerText = "R$ " + fR$(nRendimento);
        document.getElementById('valTotal').innerText = "R$ " + fR$(nTotal);
        document.getElementById('valYOC').innerText = nYOC.toFixed(2) + "%";

        updateChart(historico);
    }

    function updateChart(historico) {
        const ctx = document.getElementById('myChart').getContext('2d');
        if (chartInstance) chartInstance.destroy();

        chartInstance = new Chart(ctx, {
            type: 'line',
            data: {
                labels: historico.map(h => h[1]),
                datasets: [{
                    label: 'Total Mensal',
                    data: historico.map(h => parseNumber(h[5])),
                    borderColor: '#38bdf8',
                    tension: 0.4,
                    fill: true,
                    backgroundColor: 'rgba(56, 189, 248, 0.1)'
                }]
            },
            options: { responsive: true, maintainAspectRatio: false }
        });
    }

    fetchData();
</script>
</body>
</html>
