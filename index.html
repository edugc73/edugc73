<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard de Dividendos Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent-color: #38bdf8;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --success: #10b981;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 1100px;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        header h1 {
            font-weight: 600;
            letter-spacing: -1px;
            margin-bottom: 5px;
        }

        header p {
            color: var(--text-dim);
        }

        /* Controles */
        .controls {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-size: 0.85rem;
            color: var(--accent-color);
            font-weight: 600;
            text-transform: uppercase;
        }

        select {
            background: var(--card-bg);
            border: 1px solid #334155;
            color: white;
            padding: 12px;
            border-radius: 8px;
            outline: none;
            cursor: pointer;
            transition: border-color 0.3s;
        }

        select:focus {
            border-color: var(--accent-color);
        }

        /* Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 16px;
            border: 1px solid #334155;
            text-align: center;
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card h3 {
            margin: 0;
            font-size: 0.8rem;
            color: var(--text-dim);
            text-transform: uppercase;
        }

        .card .value {
            font-size: 1.8rem;
            font-weight: 600;
            margin-top: 10px;
            color: var(--accent-color);
        }

        /* Gráfico */
        .chart-container {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 16px;
            border: 1px solid #334155;
            height: 400px;
        }

        .loading {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--accent-color);
            color: var(--bg-color);
            padding: 10px 20px;
            border-radius: 50px;
            font-weight: 600;
            display: none;
        }
    </style>
</head>
<body>

<div id="loading" class="loading">Sincronizando Dados...</div>

<div class="container">
    <header>
        <h1>Dividend Intelligence</h1>
        <p>Análise de proventos da carteira FII</p>
    </header>

    <div class="controls">
        <div class="control-group">
            <label>Selecione o Ativo</label>
            <select id="selectAtivo" onchange="updateDashboard()"></select>
        </div>
        <div class="control-group">
            <label>Mês de Referência</label>
            <select id="selectMes" onchange="updateDashboard()"></select>
        </div>
    </div>

    <div class="stats-grid">
        <div class="card">
            <h3>Cotas Acumuladas</h3>
            <div id="valCotas" class="value">0</div>
        </div>
        <div class="card">
            <h3>Rendimento p/ Cota</h3>
            <div id="valRendimento" class="value">R$ 0,00</div>
        </div>
        <div class="card">
            <h3>Total no Mês</h3>
            <div id="valTotal" class="value">R$ 0,00</div>
        </div>
        <div class="card">
            <h3>Yield on Cost</h3>
            <div id="valYOC" class="value">0,00%</div>
        </div>
    </div>

    <div class="chart-container">
        <canvas id="myChart"></canvas>
    </div>
</div>

<script>
    const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTJFWclSmOeIDQwo5VepSJ5_XG-t-0OVr4FhWsVlmUA4t5wEk-bjTbZdOD1cXGcGnnZ6IBm2vGVZ8HQ/pub?gid=1980124587&single=true&output=csv";

    let rawData = [];
    let chartInstance = null;

    async function fetchData() {
        document.getElementById('loading').style.display = 'block';
        try {
            const response = await fetch(sheetURL);
            const text = await response.text();
            
            // Converte CSV para Objeto
            const rows = text.split('\n').map(row => row.split(','));
            const data = [];
            
            // Pula o cabeçalho se existir (ajustado para a estrutura do seu arquivo)
            for (let i = 1; i < rows.length; i++) {
                if (rows[i].length < 5) continue;
                data.push({
                    ativo: rows[i][0].trim(),
                    mes: rows[i][1].trim(),
                    cotas: rows[i][2],
                    rendimentoCota: rows[i][3],
                    yoc: rows[i][4],
                    totalMes: rows[i][5]
                });
            }

            rawData = data;
            populateFilters();
            updateDashboard();
        } catch (e) {
            console.error("Erro ao carregar dados:", e);
        }
        document.getElementById('loading').style.display = 'none';
    }

    function populateFilters() {
        const ativos = [...new Set(rawData.map(d => d.ativo))].sort();
        const meses = [...new Set(rawData.map(d => d.mes))];

        const selAtivo = document.getElementById('selectAtivo');
        const selMes = document.getElementById('selectMes');

        selAtivo.innerHTML = ativos.map(a => `<option value="${a}">${a}</option>`).join('');
        selMes.innerHTML = meses.map(m => `<option value="${m}">${m}</option>`).join('');
    }

  function parseNumber(val) {
    if (!val) return 0;
    // Remove R$, %, espaços e converte vírgula em ponto
    let clean = String(val).replace(/[R$\s%]/g, '').replace(',', '.');
    return parseFloat(clean) || 0;
}

 function updateChart(historico) {
        const ctx = document.getElementById('myChart').getContext('2d');
        
        const labels = historico.map(h => h.mes);
        const values = historico.map(h => parseNumber(h.totalMes));

        if (chartInstance) chartInstance.destroy();

        chartInstance = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    label: 'Rendimento Total (R$)',
                    data: values,
                    borderColor: '#38bdf8',
                    backgroundColor: 'rgba(56, 189, 248, 0.1)',
                    borderWidth: 3,
                    fill: true,
                    tension: 0.4,
                    pointBackgroundColor: '#38bdf8',
                    pointRadius: 5
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { display: false }
                },
                scales: {
                    y: {
                        beginAtZero: true,
                        grid: { color: '#334155' },
                        ticks: { color: '#94a3b8' }
                    },
                    x: {
                        grid: { display: false },
                        ticks: { color: '#94a3b8' }
                    }
                }
            }
        })
    
    
function updateDashboard() {
    const selectedAtivo = document.getElementById('ativoSelect').value;
    const selectedMonth = document.getElementById('monthSelect').value;

    if (!selectedAtivo || !selectedMonth || rawData.length === 0) return;

    // Pega a lista de nomes das colunas (mesmo que sejam '0', '1', '2'...)
    const col = Object.keys(rawData[0]);

    // Filtra o histórico do ativo (Coluna 0)
   const historicoAtivo = rawData.filter(d => 
    String(d[keys.ativo]).trim().toLowerCase() === String(selectedAtivo).trim().toLowerCase()
);

    // Encontra a linha do mês (Coluna 1)
    const dadosMes = historicoAtivo.find(d => 
        String(d[col[1]]).trim() === String(selectedMonth).trim()
    ) || {};

    // --- MAPEAMENTO POR POSIÇÃO (ÍNDICE) ---
    
    // Coluna 2: Quantidade de Cotas (ex: 45)
    const nCotas = parseNumber(dadosMes[col[2]]) || 0;
    
    // Coluna 3: Rendimento por Cota (ex: 1.45)
    const nDividendoCota = parseNumber(dadosMes[col[3]]) || 0;
    
    // Coluna 4: Yield on Cost (ex: 0.01228)
    let nYOC = parseNumber(dadosMes[col[4]]) || 0;
    
    // Coluna 5: Total do Mês (ex: 65.25)
    const nTotalMes = parseNumber(dadosMes[col[5]]) || 0;

    // Correção do Yield (transforma 0.0122 em 1.22%)
    if (nYOC > 0 && nYOC < 1) {
        nYOC = nYOC * 100;
    }

    // Funções de Formatação
    const fR$ = (n) => n.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    const fPct = (n) => n.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + '%';

    // --- ATUALIZAÇÃO DOS CARDS ---
    document.getElementById('valcotas').innerText = nCotas;
    document.getElementById('valMes').innerText = `R$ ${fR$(nTotalMes)}`;     // Total no Mês
    document.getElementById('valTotal').innerText = fPct(nYOC);              // Yield on Cost
    document.getElementById('valDM').innerText = `R$ ${fR$(nDividendoCota)}`; // Rendimento p/ Cota

    // --- ATUALIZAÇÃO DO GRÁFICO ---
    if (chart) {
        chart.data.labels = historicoAtivo.map(h => h[col[1]]);
        chart.data.datasets[0].data = historicoAtivo.map(h => parseNumber(h[col[5]]));
        chart.update();
    }
}
       
    }

    // Inicia a busca
    fetchData();
</script>

</body>
</html>
