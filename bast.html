<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOP - Dashboard Dinâmico</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-body: #050a1a;
            --bg-card: rgba(13, 27, 53, 0.7);
            --accent: #00d2ff;
            --text: #ffffff;
            --positive: #00ff88;
            --negative: #ff4d4d;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text);
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 20px;
            overflow-x: hidden;
        }

        /* Fundo Animado Sutil */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, #0a1f44 0%, #050a1a 100%);
            z-index: -1;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding: 20px;
            background: var(--bg-card);
            border-radius: 20px;
            backdrop-filter: blur(10px);
        }

        .logo-text {
            font-weight: 600;
            font-size: 1.5rem;
            letter-spacing: 2px;
            color: var(--accent);
        }

        select {
            background: #1a2a4a;
            color: white;
            border: 1px solid var(--accent);
            padding: 10px;
            border-radius: 10px;
            margin-left: 10px;
            cursor: pointer;
        }

        .main-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: var(--bg-card);
            padding: 25px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.05);
            text-align: center;
            transition: 0.3s;
        }

        .card:hover { transform: translateY(-5px); border-color: var(--accent); }

        .card h3 { font-size: 0.7rem; text-transform: uppercase; color: #a0b0c5; margin-bottom: 10px; }
        .card p { font-size: 1.6rem; font-weight: 600; }

        .chart-container {
            background: var(--bg-card);
            padding: 30px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.05);
            height: 400px;
        }

        .status-bar {
            text-align: center;
            font-size: 0.7rem;
            margin-top: 20px;
            color: var(--accent);
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="logo-text">GOP SYSTEM</div>
        <div>
            <select id="mesSelect"></select>
            <select id="contaSelect">
                <option value="11">Conta 11</option>
                <option value="23">Conta 23</option>
                <option value="24">Conta 24</option>
                <option value="25">Conta 25</option>
                <option value="27">Conta 27</option>
                <option value="28">Conta 28</option>
                <option value="36">Conta 36</option>
                <option value="39">Conta 39</option>
                <option value="42">Conta 42</option>
            </select>
        </div>
    </header>

    <div class="main-grid">
        <div class="card"><h3>Saldo Anterior</h3><p id="vAnt">R$ 0,00</p></div>
        <div class="card"><h3>Aquisição</h3><p id="vAq">R$ 0,00</p></div>
        <div class="card" style="color: var(--negative)"><h3>Consumo</h3><p id="vCon">R$ 0,00</p></div>
        <div class="card" style="color: var(--positive)"><h3>Saldo Atual</h3><p id="vAtu">R$ 0,00</p></div>
    </div>

    <div class="chart-container">
        <canvas id="meuGrafico"></canvas>
    </div>

    <div class="status-bar" id="status">Sincronizando...</div>
</div>

<script>
    const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQvr14C0ibyiYOSg9e8bri06iwrvBhSv0bnZNBRhD_2hDIklJbWmRE5KKZAts4uDhbbdFCVvS32SPvX/pub?gid=1190920077&single=true&output=csv'; 
    let globalData = {};
    let chartInstance = null;

    function parseFinanceValue(val) {
        if (!val) return 0;
        let cleaned = val.replace(/\./g, '').replace(',', '.');
        return parseFloat(cleaned) || 0;
    }

    async function init() {
        try {
            const res = await fetch(SHEET_URL);
            const text = await res.text();
            const rows = text.split('\n').map(r => r.split(',').map(c => c.replace(/"/g, '')));
            
            const colMap = { "11": 1, "23": 5, "24": 9, "25": 13, "27": 17, "28": 21, "36": 25, "39": 29, "42": 33 };
            const months = [];

            rows.forEach((cols, i) => {
                if (i > 1 && cols[0]) {
                    const mes = cols[0].trim().toUpperCase();
                    months.push(mes);
                    globalData[mes] = {};
                    for (let id in colMap) {
                        const idx = colMap[id];
                        globalData[mes][id] = {
                            ant: parseFinanceValue(cols[idx]),
                            aq:  parseFinanceValue(cols[idx+1]),
                            con: parseFinanceValue(cols[idx+2]),
                            atu: parseFinanceValue(cols[idx+3])
                        };
                    }
                }
            });

            const selMes = document.getElementById('mesSelect');
            selMes.innerHTML = months.map(m => `<option value="${m}">${m}</option>`).join('');
            selMes.value = months[months.length - 1];

            update();
            document.getElementById('status').innerText = "● Conectado ao Google Sheets";
        } catch (e) { document.getElementById('status').innerText = "Erro na conexão."; }
    }

    function update() {
        const mes = document.getElementById('mesSelect').value;
        const conta = document.getElementById('contaSelect').value;
        const d = globalData[mes][conta];

        const f = (v) => v.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
        document.getElementById('vAnt').innerText = f(d.ant);
        document.getElementById('vAq').innerText = f(d.aq);
        document.getElementById('vCon').innerText = f(d.con);
        document.getElementById('vAtu').innerText = f(d.atu);

        renderChart(conta);
    }

    function renderChart(contaId) {
        const labels = Object.keys(globalData);
        const values = labels.map(m => globalData[m][contaId].atu);

        if (chartInstance) chartInstance.destroy();

        const ctx = document.getElementById('meuGrafico').getContext('2d');
        chartInstance = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    label: 'Evolução Saldo Atual (Conta ' + contaId + ')',
                    data: values,
                    borderColor: '#00d2ff',
                    backgroundColor: 'rgba(0, 210, 255, 0.1)',
                    fill: true,
                    tension: 0.4
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { labels: { color: '#fff' } } },
                scales: {
                    y: { grid: { color: 'rgba(255,255,255,0.1)' }, ticks: { color: '#fff' } },
                    x: { grid: { display: false }, ticks: { color: '#fff' } }
                }
            }
        });
    }

    document.getElementById('mesSelect').onchange = update;
    document.getElementById('contaSelect').onchange = update;
    init();
</script>
</body>
</html>
