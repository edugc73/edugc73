<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOP FINANCE - Correção Final</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-body: #050a1a;
            --bg-card: rgba(13, 27, 53, 0.9);
            --accent: #00d2ff;
            --text: #ffffff;
            --pos: #00ff88;
            --neg: #ff4d4d;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text);
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            background: radial-gradient(circle at top right, #0a1f44, #050a1a);
        }

        .container { max-width: 1100px; margin: 0 auto; }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            background: var(--bg-card);
            border-radius: 15px;
            margin-bottom: 25px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .logo { font-weight: 600; font-size: 1.2rem; color: var(--accent); }

        select {
            background: #152545;
            color: white;
            border: 1px solid var(--accent);
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
        }

        .grid-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }

        .card {
            background: var(--bg-card);
            padding: 25px;
            border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.05);
            text-align: center;
        }

        .card h3 { font-size: 0.7rem; color: #8892b0; text-transform: uppercase; margin-bottom: 10px; }
        .card p { font-size: 1.5rem; font-weight: 600; margin: 0; }

        .chart-box {
            background: var(--bg-card);
            padding: 20px;
            border-radius: 15px;
            height: 300px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        #status { text-align: center; font-size: 0.7rem; color: var(--accent); margin-top: 15px; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="logo">GOP FINANCE SYSTEM</div>
        <div>
            <select id="mesSelect"></select>
            <select id="contaSelect">
                <option value="11">Conta 11</option>
                <option value="23">Conta 23</option>
                <option value="24">Conta 24</option>
                <option value="25">Conta 25</option>
                <option value="27">Conta 27</option>
                <option value="28">Conta 28</option>
                <option value="36">Conta 36</option>
                <option value="39">Conta 39</option>
                <option value="42">Conta 42</option>
            </select>
        </div>
    </header>

    <div class="grid-cards">
        <div class="card"><h3>Saldo Anterior</h3><p id="txtAnt">R$ 0,00</p></div>
        <div class="card"><h3>Aquisição</h3><p id="txtAq">R$ 0,00</p></div>
        <div class="card"><h3>Consumo</h3><p id="txtCon" style="color: var(--neg)">R$ 0,00</p></div>
        <div class="card"><h3>Saldo Atual</h3><p id="txtAtu" style="color: var(--pos)">R$ 0,00</p></div>
    </div>

    <div class="chart-box">
        <canvas id="mainChart"></canvas>
    </div>

    <div id="status">Sincronizando...</div>
</div>

<script>
    // --- INSIRA SEU LINK CSV DO GOOGLE SHEETS AQUI ---
    const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQvr14C0ibyiYOSg9e8bri06iwrvBhSv0bnZNBRhD_2hDIklJbWmRE5KKZAts4uDhbbdFCVvS32SPvX/pub?gid=1190920077&single=true&output=csv'; 

    let rawData = {};
    let myChart = null;

    // Função de limpeza robusta para tratar números brasileiros e americanos
    function parseNumber(val) {
        if (!val || val.trim() === "" || val === "0") return 0;
        // Remove R$, espaços e converte formato 1.234,56 ou 1234.56 para float
        let clean = val.replace(/[R$\s]/g, '');
        if (clean.includes(',') && clean.includes('.')) {
            clean = clean.replace(/\./g, '').replace(',', '.');
        } else {
            clean = clean.replace(',', '.');
        }
        return parseFloat(clean) || 0;
    }

    async function loadData() {
        try {
            const response = await fetch(SHEET_URL);
            const csv = await response.text();
            
            // Quebra por linhas e remove linhas vazias
            const lines = csv.split(/\r?\n/).filter(l => l.trim() !== "");
            
            // Mapeamento baseado EXATAMENTE no seu arquivo enviado
            const colMap = { 
                "11": 1, "23": 5, "24": 9, "25": 13, "27": 17, 
                "28": 21, "36": 25, "39": 29, "42": 33 
            };
            
            const months = [];

            lines.forEach((line, i) => {
                const cols = line.split(',');
                // Começa a ler a partir da linha 3 (índice 2) onde começam os meses
                if (i >= 2 && cols[0]) {
                    const mes = cols[0].trim().toUpperCase();
                    if (!months.includes(mes)) months.push(mes);
                    
                    rawData[mes] = {};
                    
                    for (let id in colMap) {
                        const start = colMap[id];
                        const ant = parseNumber(cols[start]);
                        const aq  = parseNumber(cols[start+1]);
                        const con = parseNumber(cols[start+2]);
                        
                        rawData[mes][id] = {
                            ant: ant,
                            aq: aq,
                            con: con,
                            atu: ant + aq - con // Garante a matemática correta
                        };
                    }
                }
            });

            const selMes = document.getElementById('mesSelect');
            selMes.innerHTML = months.map(m => `<option value="${m}">${m}</option>`).join('');
            selMes.value = "JANEIRO"; // Define Janeiro como inicial para conferência

            updateUI();
            document.getElementById('status').innerText = "● Conectado com Sucesso";
        } catch (e) {
            document.getElementById('status').innerText = "Erro ao carregar dados.";
            console.error(e);
        }
    }

    function updateUI() {
        const mes = document.getElementById('mesSelect').value;
        const conta = document.getElementById('contaSelect').value;
        const d = rawData[mes][conta];

        const f = (v) => v.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
        
        document.getElementById('txtAnt').innerText = f(d.ant);
        document.getElementById('txtAq').innerText = f(d.aq);
        document.getElementById('txtCon').innerText = f(d.con);
        document.getElementById('txtAtu').innerText = f(d.atu);

        updateChart(conta);
    }

    function updateChart(contaId) {
        const labels = Object.keys(rawData);
        const values = labels.map(m => rawData[m][contaId].atu);

        if (myChart) myChart.destroy();

        const ctx = document.getElementById('mainChart').getContext('2d');
        myChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    data: values,
                    borderColor: '#00d2ff',
                    backgroundColor: 'rgba(0, 210, 255, 0.1)',
                    fill: true,
                    tension: 0.3,
                    pointRadius: 4
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: {
                    y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#8892b0' } },
                    x: { grid: { display: false }, ticks: { color: '#8892b0' } }
                }
            }
        });
    }

    document.getElementById('mesSelect').onchange = updateUI;
    document.getElementById('contaSelect').onchange = updateUI;

    loadData();
</script>
</body>
</html>
