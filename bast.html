<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard de Prestação de Contas</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b1120;
            --card-bg: #161e2d;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --accent-primary: #38bdf8;
            --accent-success: #22c55e;
            --accent-danger: #f43f5e;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 20px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding: 0 10px;
        }

        .header h1 {
            font-size: 1.5rem;
            font-weight: 600;
            margin: 0;
        }

        .select-month {
            background: var(--card-bg);
            color: var(--text-main);
            border: 1px solid var(--accent-primary);
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            outline: none;
            transition: 0.3s;
        }

        .select-month:hover {
            box-shadow: 0 0 10px rgba(56, 189, 248, 0.3);
        }

        .kpi-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .card-title {
            color: var(--text-dim);
            font-size: 0.875rem;
            margin-bottom: 10px;
        }

        .card-value {
            font-size: 1.75rem;
            font-weight: 600;
        }

        .charts-grid {
            display: grid;
            grid-template-columns: 1.5fr 1fr;
            gap: 20px;
        }

        @media (max-width: 768px) {
            .charts-grid { grid-template-columns: 1fr; }
        }

        canvas {
            max-width: 100% !important;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Dashboard de Estoque & Consumo</h1>
        <select id="monthSelector" class="select-month" onchange="updateDashboard()">
            <option value="Janeiro">Janeiro</option>
            <option value="Fevereiro">Fevereiro</option>
            <option value="Março">Março</option>
            <option value="Abril">Abril</option>
        </select>
    </div>

    <div class="kpi-container">
        <div class="card">
            <div class="card-title">Saldo Atual Total</div>
            <div id="kpi-saldo" class="card-value" style="color: var(--accent-primary);">R$ 0,00</div>
        </div>
        <div class="card">
            <div class="card-title">Consumo do Mês</div>
            <div id="kpi-consumo" class="card-value" style="color: var(--accent-danger);">R$ 0,00</div>
        </div>
        <div class="card">
            <div class="card-title">Novas Aquisições</div>
            <div id="kpi-aquisicao" class="card-value" style="color: var(--accent-success);">R$ 0,00</div>
        </div>
    </div>

    <div class="charts-grid">
        <div class="card">
            <div class="card-title">Fluxo por Categoria (Consumo vs Aquisição)</div>
            <canvas id="barChart"></canvas>
        </div>
        <div class="card">
            <div class="card-title">Distribuição do Saldo (%)</div>
            <canvas id="donutChart"></canvas>
        </div>
    </div>

    <script>
        // Substitua o link abaixo pelo link que você copiou no Google Sheets
const sheetURL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQvr14C0ibyiYOSg9e8bri06iwrvBhSv0bnZNBRhD_2hDIklJbWmRE5KKZAts4uDhbbdFCVvS32SPvX/pub?output=csv';

async function buscarDadosDoSheets() {
    try {
        const response = await fetch(sheetURL);
        const dataCSV = await response.text();
        
        // Converte o CSV em Array de Objetos
        const linhas = dataCSV.split('\n').map(linha => linha.split(','));
        
        // Aqui você processa os dados conforme a estrutura das suas colunas
        // Exemplo: consolidar os dados por mês para o 'const data'
        processarDados(linhas);
        
    } catch (error) {
        console.error("Erro ao carregar dados da planilha:", error);
        alert("Não foi possível carregar os dados do Google Sheets. Verifique se o link está publicado corretamente.");
    }
}

// Função para organizar o CSV no formato do dashboard
function processarDados(linhas) {
    // Aqui você mapeia qual coluna é Mês, Consumo, Saldo, etc.
    // O comando 'linhas[0]' contém os cabeçalhos.
    console.log("Dados carregados com sucesso!", linhas);
    
    // Após organizar, chama a função de atualização
    updateDashboard(); 
}

// Chame a função ao carregar a página
window.onload = buscarDadosDoSheets;

        let barChart, donutChart;

        function initCharts() {
            const ctxBar = document.getElementById('barChart').getContext('2d');
            const ctxDonut = document.getElementById('donutChart').getContext('2d');

            barChart = new Chart(ctxBar, {
                type: 'bar',
                data: {
                    labels: [],
                    datasets: [
                        { label: 'Consumo', data: [], backgroundColor: '#f43f5e' },
                        { label: 'Aquisição', data: [], backgroundColor: '#22c55e' }
                    ]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { labels: { color: '#f8fafc' } } },
                    scales: {
                        y: { ticks: { color: '#94a3b8' }, grid: { color: '#1e293b' } },
                        x: { ticks: { color: '#94a3b8' }, grid: { display: false } }
                    }
                }
            });

            donutChart = new Chart(ctxDonut, {
                type: 'doughnut',
                data: {
                    labels: [],
                    datasets: [{
                        data: [],
                        backgroundColor: ['#38bdf8', '#818cf8', '#fbbf24', '#a78bfa'],
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { position: 'bottom', labels: { color: '#f8fafc' } } }
                }
            });
        }

        function updateDashboard() {
            const month = document.getElementById('monthSelector').value;
            const monthData = data[month] || data["Janeiro"]; // Fallback simples

            // Atualizar KPIs
            const totalSaldo = monthData.saldo.reduce((a, b) => a + b, 0);
            const totalConsumo = monthData.consumo.reduce((a, b) => a + b, 0);
            const totalAquisicao = monthData.aquisicao.reduce((a, b) => a + b, 0);

            document.getElementById('kpi-saldo').innerText = `R$ ${totalSaldo.toLocaleString()}`;
            document.getElementById('kpi-consumo').innerText = `R$ ${totalConsumo.toLocaleString()}`;
            document.getElementById('kpi-aquisicao').innerText = `R$ ${totalAquisicao.toLocaleString()}`;

            // Atualizar Gráficos
            barChart.data.labels = monthData.labels;
            barChart.data.datasets[0].data = monthData.consumo;
            barChart.data.datasets[1].data = monthData.aquisicao;
            barChart.update();

            donutChart.data.labels = monthData.labels;
            donutChart.data.datasets[0].data = monthData.saldo;
            donutChart.update();
        }

        window.onload = () => {
            initCharts();
            updateDashboard();
        };
    </script>
</body>
</html>
