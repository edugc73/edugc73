<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOP FINANCE - Stable Build</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-body: #050a1a;
            --bg-card: rgba(13, 27, 53, 0.95);
            --accent: #00d2ff;
            --text: #ffffff;
            --pos: #00ff88;
            --neg: #ff4d4d;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text);
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            background: radial-gradient(circle at top right, #0a1f44, #050a1a);
        }

        .container { max-width: 1100px; margin: 0 auto; }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            background: var(--bg-card);
            border-radius: 15px;
            margin-bottom: 25px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .logo { font-weight: 600; font-size: 1.2rem; color: var(--accent); letter-spacing: 1px; }

        .controls select {
            background: #152545;
            color: white;
            border: 1px solid var(--accent);
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
            margin-left: 10px;
        }

        .grid-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin-bottom: 25px;
        }

        .card {
            background: var(--bg-card);
            padding: 30px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.05);
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .card h3 { font-size: 0.75rem; color: #8892b0; text-transform: uppercase; margin-bottom: 15px; }
        .card p { font-size: 1.8rem; font-weight: 600; margin: 0; }

        .chart-box {
            background: var(--bg-card);
            padding: 25px;
            border-radius: 20px;
            height: 350px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        #status { text-align: center; font-size: 0.7rem; color: var(--accent); margin-top: 20px; opacity: 0.7; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="logo">GOP FINANCE SYSTEM</div>
        <div class="controls">
            <select id="mesSelect"></select>
            <select id="contaSelect">
                <option value="11">Conta 11</option>
                <option value="23">Conta 23</option>
                <option value="24">Conta 24</option>
                <option value="25">Conta 25</option>
                <option value="27">Conta 27</option>
                <option value="28">Conta 28</option>
                <option value="36">Conta 36</option>
                <option value="39">Conta 39</option>
                <option value="42">Conta 42</option>
            </select>
        </div>
    </header>

    <div class="grid-cards">
        <div class="card"><h3>Saldo Anterior</h3><p id="txtAnt">R$ 0,00</p></div>
        <div class="card"><h3>Aquisição (+)</h3><p id="txtAq">R$ 0,00</p></div>
        <div class="card"><h3>Consumo (-)</h3><p id="txtCon" style="color: var(--neg)">R$ 0,00</p></div>
        <div class="card"><h3>Saldo Atual</h3><p id="txtAtu" style="color: var(--pos)">R$ 0,00</p></div>
    </div>

    <div class="chart-box">
        <canvas id="mainChart"></canvas>
    </div>

    <div id="status">Sincronizando com Google Sheets...</div>
</div>

<script>
    const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQvr14C0ibyiYOSg9e8bri06iwrvBhSv0bnZNBRhD_2hDIklJbWmRE5KKZAts4uDhbbdFCVvS32SPvX/pub?gid=1190920077&single=true&output=csv'; 

    let rawData = {};
    let myChart = null;

    // Função avançada para dividir CSV respeitando aspas e vírgulas decimais
    function splitCSV(row) {
        const matches = row.match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g);
        if (!matches) return [];
        return matches.map(val => val.replace(/^"|"$/g, '').trim());
    }

    function parseNumber(val) {
        if (!val || val === "" || val === "0") return 0;
        // Remove R$, espaços, pontos de milhar e ajusta a vírgula decimal
        let clean = val.replace(/[R$\s]/g, '');
        if (clean.includes(',') && clean.includes('.')) {
            clean = clean.replace(/\./g, '').replace(',', '.');
        } else {
            clean = clean.replace(',', '.');
        }
        return parseFloat(clean) || 0;
    }

    async function loadData() {
        try {
            const response = await fetch(SHEET_URL);
            const csvText = await response.text();
            const lines = csvText.split(/\r?\n/).filter(l => l.trim() !== "");
            
            // Índices baseados na estrutura real da sua planilha
            const colMap = { 
                "11": 1, "23": 5, "24": 9, "25": 13, "27": 17, 
                "28": 21, "36": 25, "39": 29, "42": 33 
            };
            
            const months = [];

            lines.forEach((line, i) => {
                const cols = splitCSV(line);
                // Começa na linha 3 (índice 2)
                if (i >= 2 && cols[0]) {
                    const mes = cols[0].toUpperCase();
                    if (!months.includes(mes)) months.push(mes);
                    
                    rawData[mes] = {};
                    
                    for (let id in colMap) {
                        const start = colMap[id];
                        const ant = parseNumber(cols[start]);
                        const aq  = parseNumber(cols[start+1]);
                        const con = parseNumber(cols[start+2]);
                        
                        rawData[mes][id] = {
                            ant: ant,
                            aq: aq,
                            con: con,
                            atu: ant + aq - con
                        };
                    }
                }
            });

            const selMes = document.getElementById('mesSelect');
            selMes.innerHTML = months.map(m => `<option value="${m}">${m}</option>`).join('');
            selMes.value = "JANEIRO"; 

            updateUI();
            document.getElementById('status').innerText = "● Dados Sincronizados com Sucesso";
        } catch (e) {
            document.getElementById('status').innerText = "Erro ao carregar link CSV.";
        }
    }

    function updateUI() {
        const mes = document.getElementById('mesSelect').value;
        const conta = document.getElementById('contaSelect').value;
        
        if (!rawData[mes] || !rawData[mes][conta]) return;

        const d = rawData[mes][conta];
        const f = (v) => v.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
        
        document.getElementById('txtAnt').innerText = f(d.ant);
        document.getElementById('txtAq').innerText = f(d.aq);
        document.getElementById('txtCon').innerText = f(d.con);
        document.getElementById('txtAtu').innerText = f(d.atu);

        updateChart(conta);
    }

    function updateChart(contaId) {
        const labels = Object.keys(rawData);
        const values = labels.map(m => rawData[m][contaId].atu);

        if (myChart) myChart.destroy();

        const ctx = document.getElementById('mainChart').getContext('2d');
        myChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    label: 'Saldo Atual',
                    data: values,
                    borderColor: '#00d2ff',
                    backgroundColor: 'rgba(0, 210, 255, 0.1)',
                    fill: true,
                    tension: 0.3,
                    pointRadius: 4,
                    pointBackgroundColor: '#00ff88'
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: {
                    y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#8892b0' } },
                    x: { grid: { display: false }, ticks: { color: '#8892b0' } }
                }
            }
        });
    }

    document.getElementById('mesSelect').onchange = updateUI;
    document.getElementById('contaSelect').onchange = updateUI;

    loadData();
</script>
</body>
</html>
