<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOP - Dashboard Inteligente</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-body: #050a1a;
            --bg-card: rgba(13, 27, 53, 0.8);
            --accent: #00d2ff;
            --text: #ffffff;
            --pos: #00ff88;
            --neg: #ff4d4d;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text);
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 20px;
            background: radial-gradient(circle at top right, #0a1f44, #050a1a);
            min-height: 100vh;
        }

        .container { max-width: 1200px; margin: 0 auto; }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 25px;
            background: var(--bg-card);
            border-radius: 20px;
            margin-bottom: 30px;
            border: 1px solid rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
        }

        .logo-area { font-weight: 600; font-size: 1.4rem; color: var(--accent); letter-spacing: 1px; }

        select {
            background: #152545;
            color: white;
            border: 1px solid var(--accent);
            padding: 10px 15px;
            border-radius: 10px;
            cursor: pointer;
            outline: none;
        }

        .grid-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: var(--bg-card);
            padding: 30px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.03);
            text-align: center;
            transition: 0.3s;
        }

        .card:hover { transform: translateY(-5px); border-color: var(--accent); }
        .card h3 { font-size: 0.75rem; color: #8892b0; text-transform: uppercase; margin-bottom: 15px; }
        .card p { font-size: 1.8rem; font-weight: 600; margin: 0; }

        .chart-box {
            background: var(--bg-card);
            padding: 30px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.05);
            height: 350px;
        }

        #status { text-align: center; font-size: 0.7rem; color: var(--accent); margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="logo-area">GOP FINANCE</div>
        <div class="controls">
            <select id="mesSelect"></select>
            <select id="contaSelect">
                <option value="11">Conta 11</option>
                <option value="23">Conta 23</option>
                <option value="24">Conta 24</option>
                <option value="25">Conta 25</option>
                <option value="27">Conta 27</option>
                <option value="28">Conta 28</option>
                <option value="36">Conta 36</option>
                <option value="39">Conta 39</option>
                <option value="42">Conta 42</option>
            </select>
        </div>
    </header>

    <div class="grid-cards">
        <div class="card"><h3>Saldo Anterior</h3><p id="txtAnt">R$ 0,00</p></div>
        <div class="card"><h3>Aquisição (+)</h3><p id="txtAq">R$ 0,00</p></div>
        <div class="card"><h3>Consumo (-)</h3><p id="txtCon" style="color: var(--neg)">R$ 0,00</p></div>
        <div class="card"><h3>Saldo Atual</h3><p id="txtAtu" style="color: var(--pos)">R$ 0,00</p></div>
    </div>

    <div class="chart-box">
        <canvas id="mainChart"></canvas>
    </div>

    <div id="status">Sincronizando dados...</div>
</div>

<script>
    // --- INSIRA SEU LINK DO GOOGLE SHEETS ABAIXO ---
    const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQvr14C0ibyiYOSg9e8bri06iwrvBhSv0bnZNBRhD_2hDIklJbWmRE5KKZAts4uDhbbdFCVvS32SPvX/pub?gid=1190920077&single=true&output=csv'; 

    let rawData = {};
    let myChart = null;

    // Função de limpeza de valores monetários
    function cleanVal(v) {
        if (!v || v.trim() === "" || v === "0") return 0;
        let n = v.replace(/[R$\s]/g, '').replace(/\./g, '').replace(',', '.');
        return parseFloat(n) || 0;
    }

    // Efeito de contagem animada
    function animateValue(id, start, end, duration) {
        const obj = document.getElementById(id);
        const range = end - start;
        const startTime = new Date().getTime();
        
        const timer = setInterval(() => {
            const timePassed = new Date().getTime() - startTime;
            let progress = timePassed / duration;
            if (progress > 1) progress = 1;
            
            const current = start + (range * progress);
            obj.innerText = current.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
            
            if (progress === 1) clearInterval(timer);
        }, 16);
    }

    async function loadData() {
        try {
            const response = await fetch(SHEET_URL);
            const csv = await response.text();
            const rows = csv.split('\n').map(r => r.split(','));

            const colMap = { "11":1, "23":5, "24":9, "25":13, "27":17, "28":21, "36":25, "39":29, "42":33 };
            const months = [];

            rows.forEach((cols, i) => {
                if (i > 1 && cols[0] && cols[0].trim() !== "") {
                    const mes = cols[0].trim().toUpperCase();
                    months.push(mes);
                    rawData[mes] = {};
                    
                    for (let id in colMap) {
                        const idx = colMap[id];
                        // Lógica Matemática: Saldo Atual = Anterior + Aquisição - Consumo
                        const ant = cleanVal(cols[idx]);
                        const aq  = cleanVal(cols[idx+1]);
                        const con = cleanVal(cols[idx+2]);
                        const atu = ant + aq - con;

                        rawData[mes][id] = { ant, aq, con, atu };
                    }
                }
            });

            const selMes = document.getElementById('mesSelect');
            selMes.innerHTML = months.map(m => `<option value="${m}">${m}</option>`).join('');
            selMes.value = months[months.length - 1];

            updateUI();
            document.getElementById('status').innerText = "● Sincronizado com Google Sheets";
        } catch (e) {
            document.getElementById('status').innerText = "Erro ao carregar dados.";
        }
    }

    function updateUI() {
        const mes = document.getElementById('mesSelect').value;
        const conta = document.getElementById('contaSelect').value;
        const d = rawData[mes][conta];

        // Animação dos cartões
        animateValue("txtAnt", 0, d.ant, 500);
        animateValue("txtAq", 0, d.aq, 500);
        animateValue("txtCon", 0, d.con, 500);
        animateValue("txtAtu", 0, d.atu, 500);

        updateChart(conta);
    }

    function updateChart(contaId) {
        const labels = Object.keys(rawData);
        const values = labels.map(m => rawData[m][contaId].atu);

        if (myChart) myChart.destroy();

        const ctx = document.getElementById('mainChart').getContext('2d');
        myChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    label: 'Saldo Atual Mensal (Conta ' + contaId + ')',
                    data: values,
                    borderColor: '#00d2ff',
                    backgroundColor: 'rgba(0, 210, 255, 0.1)',
                    fill: true,
                    tension: 0.3,
                    borderWidth: 3,
                    pointRadius: 5,
                    pointBackgroundColor: '#00d2ff'
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: {
                    y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#8892b0' } },
                    x: { grid: { display: false }, ticks: { color: '#8892b0' } }
                }
            }
        });
    }

    document.getElementById('mesSelect').onchange = updateUI;
    document.getElementById('contaSelect').onchange = updateUI;

    loadData();
</script>
</body>
</html>
