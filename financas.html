<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Financeiro Real-Time</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0a192f;
            --card-bg: #112240;
            --text-main: #e6f1ff;
            --text-dim: #8892b0;
            --accent: #64ffda;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 20px;
        }

        .container { max-width: 1200px; margin: 0 auto; }
        header { margin-bottom: 30px; border-bottom: 1px solid #233554; padding-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: var(--card-bg); padding: 20px; border-radius: 12px; border-left: 4px solid var(--accent); }
        .stat-label { color: var(--text-dim); font-size: 0.75rem; text-transform: uppercase; }
        .stat-value { font-size: 1.5rem; font-weight: 600; display: block; margin-top: 5px; }

        .charts-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 25px; }
        .chart-container { background: var(--card-bg); padding: 25px; border-radius: 15px; min-height: 350px; }
        .full-width { grid-column: span 2; }
        
        #loading { color: var(--accent); font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Intelligence Financial Board</h1>
        <div id="loading">Sincronizando dados...</div>
    </header>

    <div class="stats-grid">
        <div class="stat-card">
            <span class="stat-label">Total em Investimentos</span>
            <span class="stat-value" id="kpi-invest">R$ 0,00</span>
        </div>
        <div class="stat-card">
            <span class="stat-label">Média Salarial (Total)</span>
            <span class="stat-value" id="kpi-renda">R$ 0,00</span>
        </div>
        <div class="stat-card">
            <span class="stat-label">Saldo Atual</span>
            <span class="stat-value" id="kpi-saldo" style="color: var(--accent);">R$ 0,00</span>
        </div>
    </div>

    <div class="charts-grid">
        <div class="chart-container full-width">
            <canvas id="evolutionChart"></canvas>
        </div>
        <div class="chart-container">
            <canvas id="expensesPieChart"></canvas>
        </div>
        <div class="chart-container">
            <canvas id="investBarChart"></canvas>
        </div>
    </div>
</div>

<script>
    // COLE O LINK DO SEU GOOGLE SHEETS (CSV) AQUI:
    const URL_PLANILHA = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vS-8UNFqiVrLeH2TjtmBtOIYXumGcnlkWCXIRFDq12RQJwPDJUUQnYKhv4SCkncm45vD4AOWExyc__X/pub?gid=2110660311&single=true&output=csv';

    async function fetchData() {
        Papa.parse(URL_PLANILHA, {
            download: true,
            header: true,
            dynamicTyping: true,
            complete: function(results) {
                renderDashboard(results.data);
                document.getElementById('loading').innerText = '● Live Data';
            }
        });
    }

    function renderDashboard(data) {
        // Filtrar linhas vazias
        const cleanData = data.filter(row => row.MÊS);
        
        const labels = cleanData.map(d => d.MÊS);
        const investimentos = cleanData.map(d => d.Investimentos);
        const saldoFinal = cleanData.map(d => d["Saldo Final do Mês"]);
        const saldoInicio = cleanData.map(d => d["Saldo Início do Mês"]);

        // Atualizar KPIs (Baseado no último mês)
        const lastRow = cleanData[cleanData.length - 1];
        const totalInvest = investimentos.reduce((a, b) => a + b, 0);
        
        document.getElementById('kpi-invest').innerText = `R$ ${totalInvest.toLocaleString('pt-BR')}`;
        document.getElementById('kpi-renda').innerText = `R$ ${(lastRow["Salario Aposentadoria"] + lastRow["Salário PTTC"]).toLocaleString('pt-BR')}`;
        document.getElementById('kpi-saldo').innerText = `R$ ${lastRow["Saldo Final do Mês"].toLocaleString('pt-BR')}`;

        // Configuração Comum
        Chart.defaults.color = '#8892b0';

        // Gráfico de Evolução
        new Chart(document.getElementById('evolutionChart'), {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    label: 'Fluxo de Saldo (Final)',
                    data: saldoFinal,
                    borderColor: '#64ffda',
                    backgroundColor: 'rgba(100, 255, 218, 0.1)',
                    fill: true,
                    tension: 0.3
                }]
            },
            options: { responsive: true, maintainAspectRatio: false }
        });

        // Gráfico de Gastos (Último Mês)
        new Chart(document.getElementById('expensesPieChart'), {
            type: 'doughnut',
            data: {
                labels: ['Cartão C6', 'Cartão ML', 'Contas Fixas', 'Outros'],
                datasets: [{
                    data: [lastRow["Cartão C6"], lastRow["Cartão ML"], (lastRow.Luz + lastRow.Água + lastRow.IPTU), lastRow["Outros Gastos"]],
                    backgroundColor: ['#3b82f6', '#8b5cf6', '#f43f5e', '#64ffda'],
                    borderWidth: 0
                }]
            },
            options: { responsive: true, maintainAspectRatio: false }
        });

        // Gráfico de Investimentos
        new Chart(document.getElementById('investBarChart'), {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [{
                    label: 'Aportes Mensais',
                    data: investimentos,
                    backgroundColor: '#3b82f6',
                    borderRadius: 5
                }]
            },
            options: { responsive: true, maintainAspectRatio: false }
        });
    }

    fetchData();
</script>

</body>
</html>
