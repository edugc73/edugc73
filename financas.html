<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Financeiro Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0a192f;
            --card-bg: #112240;
            --text-main: #e6f1ff;
            --text-dim: #8892b0;
            --accent: #64ffda;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 20px;
        }

        .container { max-width: 1200px; margin: 0 auto; }
        header { 
            margin-bottom: 30px; 
            border-bottom: 1px solid #233554; 
            padding-bottom: 10px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }
        
        .status-badge {
            background: #1d2d44;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.8rem;
            color: var(--accent);
            border: 1px solid var(--accent);
        }

        .stats-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); 
            gap: 20px; 
            margin-bottom: 30px; 
        }

        .stat-card { 
            background: var(--card-bg); 
            padding: 25px; 
            border-radius: 12px; 
            box-shadow: 0 10px 30px -15px rgba(2,12,27,0.7);
        }

        .stat-label { color: var(--text-dim); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; }
        .stat-value { font-size: 1.6rem; font-weight: 600; display: block; margin-top: 10px; color: #fff; }

        .charts-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 25px; }
        .chart-container { background: var(--card-bg); padding: 25px; border-radius: 15px; min-height: 350px; }
        .full-width { grid-column: span 2; }

        @media (max-width: 768px) {
            .charts-grid { grid-template-columns: 1fr; }
            .full-width { grid-column: span 1; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1 style="color: var(--accent); font-size: 1.4rem;">Gestão Financeira Estratégica</h1>
        <div id="loading" class="status-badge">Sincronizando com Google Sheets...</div>
    </header>

    <div class="stats-grid">
        <div class="stat-card">
            <span class="stat-label">Investimento Acumulado</span>
            <span class="stat-value" id="kpi-invest">R$ 0,00</span>
        </div>
        <div class="stat-card">
            <span class="stat-label">Renda Mensal Média</span>
            <span class="stat-value" id="kpi-renda">R$ 0,00</span>
        </div>
        <div class="stat-card">
            <span class="stat-label">Saldo em Conta (Último)</span>
            <span class="stat-value" id="kpi-saldo" style="color: var(--accent);">R$ 0,00</span>
        </div>
    </div>

    <div class="charts-grid">
        <div class="chart-container full-width">
            <canvas id="evolutionChart"></canvas>
        </div>
        <div class="chart-container">
            <canvas id="expensesPieChart"></canvas>
        </div>
        <div class="chart-container">
            <canvas id="investBarChart"></canvas>
        </div>
    </div>
</div>

<script>
   const URL_PLANILHA = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vS-8UNFqiVrLeH2TjtmBtOIYXumGcnlkWCXIRFDq12RQJwPDJUUQnYKhv4SCkncm45vD4AOWExyc__X/pub?gid=2110660311&single=true&output=csv';

    function parseBrValue(val) {
        if (!val) return 0;
        if (typeof val === 'number') return val;
        let clean = val.toString().replace(/\./g, '').replace(',', '.');
        return parseFloat(clean) || 0;
    }

    async function fetchData() {
        Papa.parse(URL_PLANILHA, {
            download: true,
            header: true,
            skipEmptyLines: true,
            dynamicTyping: true,
            complete: function(results) {
                const data = results.data;
                const firstRow = data[0];
                const hasMonth = Object.keys(firstRow).some(key => 
                    key.toUpperCase().includes('MÊS') || key.toUpperCase().includes('MES')
                );

                if (data.length > 0 && hasMonth) {
                    renderDashboard(data);
                    document.getElementById('loading').innerText = '● Live Data';
                } else {
                    document.getElementById('loading').innerText = 'Erro: Verifique as colunas da planilha';
                }
            }
        });
    }

    function renderDashboard(rawData) {
        const data = rawData.map(row => {
            const newRow = {};
            for (let key in row) {
                newRow[key.trim()] = row[key];
            }
            return newRow;
        });

        const lastRow = data[data.length - 1];
        const labels = data.map(d => d.MÊS || d.Mes || d.MES);
        
        // 1. Renda Total do Mês (Soma dos Salários)
        const rendaTotal = parseBrValue(lastRow["Salario Aposentadoria"]) + parseBrValue(lastRow["Salário PTTC"]);
        document.querySelector('.stats-grid .stat-card:nth-child(1) .stat-label').innerText = "Renda Total do Mês";
        document.getElementById('kpi-invest').innerText = `R$ ${rendaTotal.toLocaleString('pt-BR', {minimumFractionDigits: 2})}`;

        // 2. Total de Despesas (Soma de todos os gastos listados no último mês)
        const totalDespesas = parseBrValue(lastRow["Cartão C6"]) + 
                              parseBrValue(lastRow["Cartão ML"]) + 
                              parseBrValue(lastRow.Luz) + 
                              parseBrValue(lastRow.Água) + 
                              parseBrValue(lastRow.IPTU) + 
                              parseBrValue(lastRow.IPVA) + 
                              parseBrValue(lastRow["Outros Gastos"]);
        
        document.querySelector('.stats-grid .stat-card:nth-child(2) .stat-label').innerText = "Total de Despesas";
        document.getElementById('kpi-renda').innerText = `R$ ${totalDespesas.toLocaleString('pt-BR', {minimumFractionDigits: 2})}`;

        // 3. Saldo Final do Mês
        const saldoFinalMes = parseBrValue(lastRow["Saldo Final do Mês"]);
        document.querySelector('.stats-grid .stat-card:nth-child(3) .stat-label').innerText = "Saldo Final do Mês";
        document.getElementById('kpi-saldo').innerText = `R$ ${saldoFinalMes.toLocaleString('pt-BR', {minimumFractionDigits: 2})}`;

        Chart.defaults.color = '#8892b0';
        Chart.defaults.font.family = "'Inter', sans-serif";

        // Gráfico 1: Evolução
        new Chart(document.getElementById('evolutionChart'), {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    label: 'Saldo Mensal',
                    data: data.map(d => parseBrValue(d["Saldo Final do Mês"])),
                    borderColor: '#64ffda',
                    backgroundColor: 'rgba(100, 255, 218, 0.1)',
                    fill: true,
                    tension: 0.4
                }]
            },
            options: { responsive: true, maintainAspectRatio: false }
        });

        // 4. Gráfico de Barras Horizontais (Despesas da maior para a menor)
        const despesasBrutas = [
            { nome: 'Cartão C6', valor: parseBrValue(lastRow["Cartão C6"]) },
            { nome: 'Cartão ML', valor: parseBrValue(lastRow["Cartão ML"]) },
            { nome: 'Luz/Água/IPTU', valor: (parseBrValue(lastRow.Luz) + parseBrValue(lastRow.Água) + parseBrValue(lastRow.IPTU)) },
            { nome: 'IPVA/Outros', valor: (parseBrValue(lastRow.IPVA) + parseBrValue(lastRow["Outros Gastos"])) }
        ];

        // Ordenar do maior para o menor
        despesasBrutas.sort((a, b) => b.valor - a.valor);

        new Chart(document.getElementById('expensesPieChart'), {
            type: 'bar',
            data: {
                labels: despesasBrutas.map(d => d.nome),
                datasets: [{
                    label: 'Valor R$',
                    data: despesasBrutas.map(d => d.valor),
                    backgroundColor: '#f43f5e',
                    borderRadius: 5
                }]
            },
            options: { 
                indexAxis: 'y', // Transforma em barra horizontal
                responsive: true, 
                maintainAspectRatio: false,
                plugins: { 
                    title: { display: true, text: 'Ranking de Despesas (Mês Atual)', color: '#e6f1ff' },
                    legend: { display: false }
                },
                scales: {
                    x: { grid: { color: '#233554' } },
                    y: { grid: { display: false } }
                }
            }
        });

        // Gráfico 3: Aportes
        new Chart(document.getElementById('investBarChart'), {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [{
                    label: 'Aportes',
                    data: data.map(d => parseBrValue(d.Investimentos)),
                    backgroundColor: '#3b82f6'
                }]
            },
            options: { responsive: true, maintainAspectRatio: false }
        });
    }

    fetchData();
</script>

</body>
</html>
