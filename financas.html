<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Financeiro Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0a192f;
            --card-bg: #112240;
            --text-main: #e6f1ff;
            --text-dim: #8892b0;
            --accent: #64ffda;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 20px;
        }

        .container { max-width: 1200px; margin: 0 auto; }
        header { 
            margin-bottom: 30px; 
            border-bottom: 1px solid #233554; 
            padding-bottom: 10px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }
        
        .status-badge {
            background: #1d2d44;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.8rem;
            color: var(--accent);
            border: 1px solid var(--accent);
        }

        .stats-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); 
            gap: 20px; 
            margin-bottom: 30px; 
        }

        .stat-card { 
            background: var(--card-bg); 
            padding: 25px; 
            border-radius: 12px; 
            box-shadow: 0 10px 30px -15px rgba(2,12,27,0.7);
        }

        .stat-label { color: var(--text-dim); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; }
        .stat-value { font-size: 1.6rem; font-weight: 600; display: block; margin-top: 10px; color: #fff; }

        .charts-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 25px; }
        .chart-container { background: var(--card-bg); padding: 25px; border-radius: 15px; min-height: 350px; }
        .full-width { grid-column: span 2; }

        @media (max-width: 768px) {
            .charts-grid { grid-template-columns: 1fr; }
            .full-width { grid-column: span 1; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1 style="color: var(--accent); font-size: 1.4rem;">Gestão Financeira Estratégica</h1>
        <div id="loading" class="status-badge">Sincronizando com Google Sheets...</div>
    </header>

    <div class="stats-grid">
        <div class="stat-card">
            <span class="stat-label">Investimento Acumulado</span>
            <span class="stat-value" id="kpi-invest">R$ 0,00</span>
        </div>
        <div class="stat-card">
            <span class="stat-label">Renda Mensal Média</span>
            <span class="stat-value" id="kpi-renda">R$ 0,00</span>
        </div>
        <div class="stat-card">
            <span class="stat-label">Saldo em Conta (Último)</span>
            <span class="stat-value" id="kpi-saldo" style="color: var(--accent);">R$ 0,00</span>
        </div>
    </div>

    <div class="charts-grid">
        <div class="chart-container full-width">
            <canvas id="evolutionChart"></canvas>
        </div>
        <div class="chart-container">
            <canvas id="expensesPieChart"></canvas>
        </div>
        <div class="chart-container">
            <canvas id="investBarChart"></canvas>
        </div>
    </div>
</div>

<script>
    const URL_PLANILHA = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vS-8UNFqiVrLeH2TjtmBtOIYXumGcnlkWCXIRFDq12RQJwPDJUUQnYKhv4SCkncm45vD4AOWExyc__X/pub?gid=2110660311&single=true&output=csv';

    // Função para converter strings de moeda brasileira para números (Ex: "1.200,50" -> 1200.50)
    function parseBrValue(val) {
        if (!val) return 0;
        if (typeof val === 'number') return val;
        let clean = val.replace(/\./g, '').replace(',', '.');
        return parseFloat(clean) || 0;
    }

    async function fetchData() {
        Papa.parse(URL_PLANILHA, {
            download: true,
            header: true,
            skipEmptyLines: true,
            complete: function(results) {
                const data = results.data;
                
                // Validação básica se os dados chegaram
                if (data.length > 0 && data[0].MÊS) {
                    renderDashboard(data);
                    document.getElementById('loading').innerText = '● Live Data';
                } else {
                    document.getElementById('loading').innerText = 'Erro ao ler colunas';
                }
            }
        });
    }

    function renderDashboard(rawData) {
        // Processar dados limpando os valores brasileiros
        const labels = rawData.map(d => d.MÊS);
        const investimentos = rawData.map(d => parseBrValue(d.Investimentos));
        const saldoFinal = rawData.map(d => parseBrValue(d["Saldo Final do Mês"]));
        
        const lastRow = rawData[rawData.length - 1];
        
        // Atualizar KPIs
        const totalInvest = investimentos.reduce((a, b) => a + b, 0);
        document.getElementById('kpi-invest').innerText = `R$ ${totalInvest.toLocaleString('pt-BR', {minimumFractionDigits: 2})}`;
        
        const rendaMensal = parseBrValue(lastRow["Salario Aposentadoria"]) + parseBrValue(lastRow["Salário PTTC"]);
        document.getElementById('kpi-renda').innerText = `R$ ${rendaMensal.toLocaleString('pt-BR', {minimumFractionDigits: 2})}`;
        
        document.getElementById('kpi-saldo').innerText = `R$ ${parseBrValue(lastRow["Saldo Final do Mês"]).toLocaleString('pt-BR', {minimumFractionDigits: 2})}`;

        Chart.defaults.color = '#8892b0';
        Chart.defaults.font.family = "'Inter', sans-serif";

        // 1. Gráfico de Evolução Patrimonial
        new Chart(document.getElementById('evolutionChart'), {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    label: 'Saldo Final do Mês',
                    data: saldoFinal,
                    borderColor: '#64ffda',
                    backgroundColor: 'rgba(100, 255, 218, 0.1)',
                    fill: true,
                    tension: 0.4,
                    pointRadius: 5,
                    pointBackgroundColor: '#64ffda'
                }]
            },
            options: { 
                responsive: true, 
                maintainAspectRatio: false,
                plugins: { title: { display: true, text: 'Crescimento de Patrimônio Líquido', color: '#e6f1ff' } }
            }
        });

        // 2. Gráfico de Composição de Despesas (Último Mês)
        new Chart(document.getElementById('expensesPieChart'), {
            type: 'doughnut',
            data: {
                labels: ['Cartão C6', 'Cartão ML', 'Gastos Fixos', 'Outros/IPVA'],
                datasets: [{
                    data: [
                        parseBrValue(lastRow["Cartão C6"]),
                        parseBrValue(lastRow["Cartão ML"]),
                        (parseBrValue(lastRow.Luz) + parseBrValue(lastRow.Água) + parseBrValue(lastRow.IPTU)),
                        (parseBrValue(lastRow.IPVA) + parseBrValue(lastRow["Outros Gastos"]))
                    ],
                    backgroundColor: ['#3b82f6', '#8b5cf6', '#f43f5e', '#64ffda'],
                    borderWidth: 0
                }]
            },
            options: { 
                responsive: true, 
                maintainAspectRatio: false,
                cutout: '70%',
                plugins: { 
                    legend: { position: 'bottom' },
                    title: { display: true, text: 'Distribuição de Despesas', color: '#e6f1ff' }
                }
            }
        });

        // 3. Gráfico de Aportes de Investimento
        new Chart(document.getElementById('investBarChart'), {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [{
                    label: 'Valor de Aporte',
                    data: investimentos,
                    backgroundColor: '#3b82f6',
                    borderRadius: 6
                }]
            },
            options: { 
                responsive: true, 
                maintainAspectRatio: false,
                plugins: { title: { display: true, text: 'Aportes em Investimentos', color: '#e6f1ff' } }
            }
        });
    }

    fetchData();
</script>

</body>
</html>
