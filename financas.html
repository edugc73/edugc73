<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Financeiro Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0a192f;
            --card-bg: #112240;
            --text-main: #e6f1ff;
            --text-dim: #8892b0;
            --accent: #64ffda;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 20px;
        }

        .container { max-width: 1200px; margin: 0 auto; }
        
        header { 
            margin-bottom: 30px; 
            border-bottom: 1px solid #233554; 
            padding-bottom: 20px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            flex-wrap: wrap;
            gap: 15px;
        }

        /* Estilização do Seletor de Mês */
        .controls { display: flex; align-items: center; gap: 10px; }
        
        select {
            background: var(--card-bg);
            color: var(--accent);
            border: 1px solid var(--accent);
            padding: 8px 15px;
            border-radius: 8px;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            outline: none;
        }

        .status-badge {
            background: #1d2d44;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.8rem;
            color: var(--accent);
            border: 1px solid var(--accent);
        }

        .stats-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); 
            gap: 20px; 
            margin-bottom: 30px; 
        }

        .stat-card {
            background: var(--card-bg); 
            padding: 25px; 
            border-radius: 12px; 
            box-shadow: 0 10px 30px -15px rgba(2,12,27,0.7);
        }

        .stat-label { color: var(--text-dim); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; }
        .stat-value { font-size: 1.6rem; font-weight: 600; display: block; margin-top: 10px; color: #fff; }

        .charts-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 25px; }
        .chart-container { background: var(--card-bg); padding: 25px; border-radius: 15px; min-height: 350px; }
        .full-width { grid-column: span 2; }

        @media (max-width: 768px) {
            .charts-grid { grid-template-columns: 1fr; }
            .full-width { grid-column: span 1; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div>
            <h1 style="color: var(--accent); font-size: 1.4rem; margin: 0;">Gestão Financeira Estratégica</h1>
            <div id="loading" class="status-badge" style="margin-top: 5px; display: inline-block;">Sincronizando...</div>
        </div>
        
        <div class="controls">
            <label for="monthSelect" style="font-size: 0.8rem; color: var(--text-dim);">FILTRAR MÊS:</label>
            <select id="monthSelect">
                </select>
        </div>
    </header>

    <div class="stats-grid">
        <div class="stat-card">
            <span class="stat-label">Renda Total do Mês</span>
            <span class="stat-value" id="kpi-renda-total">R$ 0,00</span>
        </div>
        <div class="stat-card">
            <span class="stat-label">Total de Despesas</span>
            <span class="stat-value" id="kpi-despesas">R$ 0,00</span>
        </div>
        <div class="stat-card">
            <span class="stat-label">Saldo Final do Mês</span>
            <span class="stat-value" id="kpi-saldo" style="color: var(--accent);">R$ 0,00</span>
        </div>
    </div>

    <div class="charts-grid">
        <div class="chart-container full-width">
            <canvas id="evolutionChart"></canvas>
        </div>
        <div class="chart-container">
            <canvas id="expensesBarChart"></canvas>
        </div>
        <div class="chart-container">
            <canvas id="investBarChart"></canvas>
        </div>
    </div>
</div>

<script>
    const URL_PLANILHA = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vS-8UNFqiVrLeH2TjtmBtOIYXumGcnlkWCXIRFDq12RQJwPDJUUQnYKhv4SCkncm45vD4AOWExyc__X/pub?gid=2110660311&single=true&output=csv';
    
    let globalData = [];
    let charts = {};

    function parseBrValue(val) {
        if (!val) return 0;
        if (typeof val === 'number') return val;
        let clean = val.toString().replace(/\./g, '').replace(',', '.');
        return parseFloat(clean) || 0;
    }

    async function fetchData() {
        Papa.parse(URL_PLANILHA, {
            download: true,
            header: true,
            skipEmptyLines: true,
            complete: function(results) {
                // Normalizar nomes das colunas (trim)
                globalData = results.data.map(row => {
                    const newRow = {};
                    for (let key in row) { newRow[key.trim()] = row[key]; }
                    return newRow;
                });

                if (globalData.length > 0) {
                    initMonthSelector();
                    updateDashboard(globalData.length - 1); // Começa com o último mês
                    document.getElementById('loading').innerText = '● Live Data';
                }
            }
        });
    }

    function initMonthSelector() {
        const select = document.getElementById('monthSelect');
        select.innerHTML = '';
        
        globalData.forEach((row, index) => {
            const mes = row.MÊS || row.Mes || row.MES;
            if (mes) {
                const option = document.createElement('option');
                option.value = index;
                option.text = mes;
                if (index === globalData.length - 1) option.selected = true;
                select.appendChild(option);
            }
        });

        select.addEventListener('change', (e) => {
            updateDashboard(parseInt(e.target.value));
        });
    }

    function updateDashboard(index) {
        const row = globalData[index];
        const labelsEvolucao = globalData.map(d => d.MÊS || d.Mes || d.MES);

        // 1. Atualizar KPIs
        const rendaTotal = parseBrValue(row["Salario Aposentadoria"]) + parseBrValue(row["Salário PTTC"]);
        const totalDespesas = parseBrValue(row["Cartão C6"]) + 
                             parseBrValue(row["Cartão ML"]) + 
                             parseBrValue(row.Luz) + 
                             parseBrValue(row.Água) + 
                             parseBrValue(row.DESKTOP) + 
                             parseBrValue(row.IPTU) + 
                             parseBrValue(row["Internet Mãe"]) + 
                             parseBrValue(row.Celular) + 
                             parseBrValue(row["Canção Nova"]) + 
                             parseBrValue(row.IPVA) + 
                             parseBrValue(row["Outros Gastos"]);
        const saldoFinal = parseBrValue(row["Saldo Final do Mês"]);

        document.getElementById('kpi-renda-total').innerText = rendaTotal.toLocaleString('pt-BR', {style: 'currency', currency: 'BRL'});
        document.getElementById('kpi-despesas').innerText = totalDespesas.toLocaleString('pt-BR', {style: 'currency', currency: 'BRL'});
        document.getElementById('kpi-saldo').innerText = saldoFinal.toLocaleString('pt-BR', {style: 'currency', currency: 'BRL'});

        // 2. Destruir gráficos existentes para recriar com novos dados
        Object.values(charts).forEach(chart => chart.destroy());

        Chart.defaults.color = '#8892b0';
        Chart.defaults.font.family = "'Inter', sans-serif";

        // Gráfico de Evolução (Mantém o histórico completo, mas destaca o mês atual)
        charts.evolution = new Chart(document.getElementById('evolutionChart'), {
            type: 'line',
            data: {
                labels: labelsEvolucao,
                datasets: [{
                    label: 'Saldo Mensal',
                    data: globalData.map(d => parseBrValue(d["Saldo Final do Mês"])),
                    borderColor: '#64ffda',
                    backgroundColor: 'rgba(100, 255, 218, 0.1)',
                    fill: true,
                    tension: 0.4,
                    pointRadius: globalData.map((_, i) => i === index ? 8 : 3),
                    pointBackgroundColor: globalData.map((_, i) => i === index ? '#64ffda' : '#233554')
                }]
            },
            options: { 
                responsive: true, 
                maintainAspectRatio: false,
                plugins: { title: { display: true, text: 'Histórico de Saldo Final', color: '#e6f1ff' } }
            }
        });

        // Gráfico de Despesas do Mês Selecionado
        const despesasData = [
            { nome: 'C6', valor: parseBrValue(row["Cartão C6"]) },
            { nome: 'ML', valor: parseBrValue(row["Cartão ML"]) },
            { nome: 'Fixas (L/A/I)', valor: (parseBrValue(row.Luz) + parseBrValue(row.Água) + parseBrValue(row.IPTU)) },
            { nome: 'Outros', valor: (parseBrValue(row.IPVA) + parseBrValue(row["Outros Gastos"])) }
        ].sort((a, b) => b.valor - a.valor);

        charts.expenses = new Chart(document.getElementById('expensesBarChart'), {
            type: 'bar',
            data: {
                labels: despesasData.map(d => d.nome),
                datasets: [{
                    label: 'Valor R$',
                    data: despesasData.map(d => d.valor),
                    backgroundColor: '#f43f5e',
                    borderRadius: 5
                }]
            },
            options: { 
                indexAxis: 'y',
                responsive: true, 
                maintainAspectRatio: false,
                plugins: { title: { display: true, text: 'Ranking de Gastos: ' + (row.MÊS || row.Mes), color: '#e6f1ff' }, legend: { display: false } }
            }
        });

        // Gráfico de Aportes
        charts.invest = new Chart(document.getElementById('investBarChart'), {
            type: 'bar',
            data: {
                labels: labelsEvolucao,
                datasets: [{
                    label: 'Investimentos',
                    data: globalData.map(d => parseBrValue(d.Investimentos)),
                    backgroundColor: globalData.map((_, i) => i === index ? '#64ffda' : '#3b82f6')
                }]
            },
            options: { 
                responsive: true, 
                maintainAspectRatio: false,
                plugins: { title: { display: true, text: 'Evolução de Aportes', color: '#e6f1ff' } }
            }
        });
    }

    fetchData();
</script>

</body>
</html>
