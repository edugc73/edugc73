<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financial Intelligence | Multi-Year Dashboard</title>
    
    <!-- Dependências -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #030712;
            --surface: #111827;
            --surface-accent: #1f2937;
            --primary: #10b981;
            --secondary: #3b82f6;
            --warning: #f59e0b;
            --danger: #ef4444;
            --text-main: #f9fafb;
            --text-muted: #9ca3af;
            --glass: rgba(17, 24, 39, 0.7);
            --border: rgba(255, 255, 255, 0.08);
            --accent-purple: #8b5cf6;
            --chart-grid: rgba(255, 255, 255, 0.05);
            --focus-ring: #3b82f6;
        }

        [data-theme="light"] {
            --bg: #f3f4f6;
            --surface: #ffffff;
            --surface-accent: #e5e7eb;
            --primary: #059669;
            --secondary: #2563eb;
            --warning: #d97706;
            --danger: #dc2626;
            --text-main: #111827;
            --text-muted: #4b5563;
            --glass: rgba(255, 255, 255, 0.8);
            --border: rgba(0, 0, 0, 0.08);
            --accent-purple: #7c3aed;
            --chart-grid: rgba(0, 0, 0, 0.1);
            --focus-ring: #2563eb;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg);
            background-image: 
                radial-gradient(at 0% 0%, rgba(16, 185, 129, 0.05) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(59, 130, 246, 0.05) 0px, transparent 50%);
            background-attachment: fixed;
            color: var(--text-main);
            font-family: 'Plus Jakarta Sans', sans-serif;
            min-height: 100vh;
            padding: 15px;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .container { max-width: 1400px; margin: 0 auto; animation: fadeIn 0.6s ease-out; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        header {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
            padding: 16px 20px;
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 20px;
            backdrop-filter: blur(10px);
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .brand { display: flex; align-items: center; gap: 10px; }
        .brand-icon { 
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            padding: 8px;
            border-radius: 10px;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .brand h1 { font-size: 1.1rem; font-weight: 700; }

        .actions-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .theme-toggle {
            background: var(--surface-accent);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 6px;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .year-selector {
            display: flex;
            background: var(--surface-accent);
            padding: 3px;
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        .year-btn {
            padding: 6px 14px;
            border-radius: 9px;
            border: none;
            background: transparent;
            color: var(--text-muted);
            font-weight: 700;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .year-btn.active {
            background: var(--primary);
            color: white;
        }

        /* Ajuste dos Meses (Chips) */
        .month-chips-container {
            display: flex;
            gap: 6px;
            overflow-x: auto;
            padding: 2px;
            margin: 0;
            scrollbar-width: none;
            justify-content: space-between; /* Tenta distribuir se houver espaço */
        }
        .month-chips-container::-webkit-scrollbar { display: none; }

        .chip {
            padding: 6px 12px;
            background: var(--surface-accent);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-muted);
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s ease;
            flex: 1; /* Faz com que todos tentem ter o mesmo tamanho */
            text-align: center;
            max-width: 100px;
        }

        .chip.active {
            background: var(--primary);
            border-color: var(--primary);
            color: white;
            box-shadow: 0 2px 8px rgba(16, 185, 129, 0.2);
        }

        .chip.special {
            background: rgba(59, 130, 246, 0.1);
            border-color: var(--secondary);
            color: var(--secondary);
            flex: 1.5; /* Dá um pouco mais de destaque ao resumo anual */
        }

        .chip.special.active {
            background: var(--secondary);
            color: white;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-bottom: 20px;
        }

        .card {
            background: var(--glass);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 18px;
        }

        .kpi-label { color: var(--text-muted); font-size: 0.7rem; font-weight: 600; text-transform: uppercase; margin-bottom: 4px; display: block; }
        .kpi-value { font-size: 1.35rem; font-weight: 700; margin-bottom: 4px; display: block; }

        .main-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 16px;
        }

        .chart-box { min-height: 350px; display: flex; flex-direction: column; }
        .chart-container { flex-grow: 1; position: relative; }
        .chart-title { font-weight: 600; font-size: 0.9rem; display: flex; align-items: center; gap: 8px; }

        .category-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            background: var(--surface-accent);
            border-radius: 10px;
            margin-bottom: 6px;
        }

        .progress-list { display: flex; flex-direction: column; gap: 14px; }
        .progress-bar-bg { background: var(--surface-accent); height: 6px; border-radius: 3px; margin-top: 5px; }
        .progress-bar-fill { height: 100%; border-radius: 3px; transition: width 0.8s ease; }

        /* Loader */
        #loader {
            position: fixed; inset: 0; background: var(--bg); z-index: 9999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        .spinner { width: 30px; height: 30px; border: 3px solid var(--surface-accent); border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 1200px) {
            .month-chips-container { justify-content: flex-start; }
            .chip { flex: none; }
        }

        @media (max-width: 1024px) { 
            .stats-grid { grid-template-columns: repeat(2, 1fr); } 
            .main-grid { grid-template-columns: 1fr; } 
        }
    </style>
</head>
<body data-theme="dark">

<div id="loader">
    <div class="spinner"></div>
    <p style="margin-top: 15px; font-size: 0.8rem; color: var(--text-muted);">Sincronizando dados...</p>
</div>

<div class="container" id="main-content" style="display: none;">
    <header>
        <div class="header-top">
            <div class="brand">
                <div class="brand-icon"><i data-lucide="bar-chart-big" size="18"></i></div>
                <div>
                    <h1>Gestão de Patrimônio</h1>
                    <p style="font-size: 0.65rem; color: var(--primary);">Inteligência Financeira</p>
                </div>
            </div>
            <div class="actions-group">
                <button class="theme-toggle" id="themeSwitcher">
                    <i data-lucide="sun" id="sunIcon" style="display:none" size="16"></i>
                    <i data-lucide="moon" id="moonIcon" size="16"></i>
                </button>
                <div class="year-selector">
                    <button class="year-btn active" id="btn-2025" onclick="changeYear('2025', this)">2025</button>
                    <button class="year-btn" id="btn-2026" onclick="changeYear('2026', this)">2026</button>
                </div>
            </div>
        </div>
        <div class="month-chips-container" id="monthChips"></div>
    </header>

    <div class="stats-grid">
        <div class="card"><span class="kpi-label">Entrada</span><span class="kpi-value" id="kpi-receita">R$ 0,00</span></div>
        <div class="card"><span class="kpi-label">Saída Total</span><span class="kpi-value" id="kpi-gastos">R$ 0,00</span></div>
        <div class="card"><span class="kpi-label">Investido</span><span class="kpi-value" id="kpi-invest">R$ 0,00</span></div>
        <div class="card"><span class="kpi-label">Saldo</span><span class="kpi-value" id="kpi-saldo" style="color: var(--primary);">R$ 0,00</span></div>
    </div>

    <div class="main-grid">
        <div class="left-col">
            <div class="card chart-box">
                <div class="chart-header" style="margin-bottom: 12px;">
                    <div class="chart-title"><i data-lucide="trending-up" size="16" color="var(--primary)"></i> Comparativo Renda vs Gastos</div>
                </div>
                <div class="chart-container"><canvas id="mainChart"></canvas></div>
            </div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 16px;">
                <div class="card">
                    <div class="chart-title" style="margin-bottom: 12px;"><i data-lucide="pie-chart" size="16" color="var(--secondary)"></i> Composição</div>
                    <div class="chart-container" style="height: 160px;"><canvas id="compositionChart"></canvas></div>
                </div>
                <div class="card">
                    <div class="chart-title" style="margin-bottom: 12px;"><i data-lucide="list" size="16"></i> Detalhes</div>
                    <div id="composition-list"></div>
                </div>
            </div>
        </div>
        <div class="right-col">
            <div class="card" style="height: 100%;">
                <div class="chart-title" style="margin-bottom: 20px;"><i data-lucide="activity" size="16" color="var(--accent-purple)"></i> Saúde do Mês</div>
                <div class="progress-list">
                    <div>
                        <div style="display: flex; justify-content: space-between; font-size: 0.8rem;"><span>Comprometimento</span><span id="perc-gastos">0%</span></div>
                        <div class="progress-bar-bg"><div id="bar-gastos" class="progress-bar-fill" style="background: var(--danger)"></div></div>
                    </div>
                    <div>
                        <div style="display: flex; justify-content: space-between; font-size: 0.8rem;"><span>Investimento</span><span id="perc-invest">0%</span></div>
                        <div class="progress-bar-bg"><div id="bar-invest" class="progress-bar-fill" style="background: var(--secondary)"></div></div>
                    </div>
                    <div>
                        <div style="display: flex; justify-content: space-between; font-size: 0.8rem;"><span>Margem</span><span id="perc-saldo">0%</span></div>
                        <div class="progress-bar-bg"><div id="bar-saldo" class="progress-bar-fill" style="background: var(--primary)"></div></div>
                    </div>
                </div>
                <div style="margin-top: 25px; padding: 15px; background: rgba(139, 92, 246, 0.05); border-radius: 12px; border: 1px solid rgba(139, 92, 246, 0.1);">
                    <p id="analysis-text" style="font-size: 0.75rem; color: var(--text-muted); line-height: 1.5;">---</p>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const SOURCES = {
        '2025': 'https://docs.google.com/spreadsheets/d/e/2PACX-1vS-8UNFqiVrLeH2TjtmBtOIYXumGcnlkWCXIRFDq12RQJwPDJUUQnYKhv4SCkncm45vD4AOWExyc__X/pub?gid=256105834&single=true&output=csv',
        '2026': 'https://docs.google.com/spreadsheets/d/e/2PACX-1vS-8UNFqiVrLeH2TjtmBtOIYXumGcnlkWCXIRFDq12RQJwPDJUUQnYKhv4SCkncm45vD4AOWExyc__X/pub?gid=2110660311&single=true&output=csv'
    };

    let currentData = [];
    let charts = {};
    let lastActiveIdx = 0;
    let currentYear = '2025';

    const fmt = new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' });
    const MESES_NOMES = ["janeiro", "fevereiro", "marco", "abril", "maio", "junho", "julho", "agosto", "setembro", "outubro", "novembro", "dezembro"];

    document.getElementById('themeSwitcher').onclick = () => {
        const body = document.body;
        const newTheme = body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        body.setAttribute('data-theme', newTheme);
        document.getElementById('sunIcon').style.display = newTheme === 'light' ? 'none' : 'block';
        document.getElementById('moonIcon').style.display = newTheme === 'light' ? 'block' : 'none';
        updateCharts(lastActiveIdx, getActiveStats());
    };

    function normalize(str) { return str ? str.toString().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").trim() : ""; }
    function parseVal(v) {
        if (!v) return 0;
        if (typeof v === 'number') return v;
        let n = parseFloat(v.toString().replace(/\s/g, '').replace('R$', '').replace(/\./g, '').replace(',', '.'));
        return isNaN(n) ? 0 : n;
    }
    function getVal(row, key) {
        const t = normalize(key);
        for (let k in row) if (normalize(k) === t) return row[k];
        return undefined;
    }

    function getMonthStats(row) {
        if (!row) return null;
        const c6 = parseVal(getVal(row, "Cartao C6")), ml = parseVal(getVal(row, "Cartao ML"));
        const fixos = parseVal(getVal(row, "Luz")) + parseVal(getVal(row, "Agua")) + parseVal(getVal(row, "DESKTOP")) + parseVal(getVal(row, "Internet Mae")) + parseVal(getVal(row, "IPTU")) + parseVal(getVal(row, "Celular"));
        const gTotal = fixos + c6 + ml + parseVal(getVal(row, "Outros Gastos")) + parseVal(getVal(row, "IPVA")) + parseVal(getVal(row, "Cancao Nova"));
        const rTotal = parseVal(getVal(row, "Salario Aposentadoria")) + parseVal(getVal(row, "Salario PTTC"));
        return { 
            mes: getVal(row, "Mes") || "---", rTotal, gTotal, invest: parseVal(getVal(row, "Investimentos")), 
            saldo: parseVal(getVal(row, "Saldo Final do Mes")), totalCartoes: c6 + ml, custosFixos: fixos,
            totalOutros: parseVal(getVal(row, "Outros Gastos")) + parseVal(getVal(row, "IPVA")) + parseVal(getVal(row, "Cancao Nova"))
        };
    }

    function getActiveStats() {
        if (lastActiveIdx === 'annual') {
            return currentData.reduce((acc, row) => {
                const s = getMonthStats(row);
                Object.keys(s).forEach(k => { if(k !== 'mes') acc[k] = (acc[k] || 0) + s[k]; });
                return acc;
            }, { mes: 'Resumo Anual' });
        }
        return getMonthStats(currentData[lastActiveIdx]);
    }

    async function changeYear(year, btn) {
        currentYear = year;
        document.querySelectorAll('.year-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        await loadYearData(year);
    }

    async function loadYearData(year) {
        document.getElementById('loader').style.display = 'flex';
        document.getElementById('main-content').style.display = 'none';

        Papa.parse(SOURCES[year], {
            download: true, header: true, skipEmptyLines: true,
            complete: (r) => {
                currentData = r.data.filter(row => MESES_NOMES.includes(normalize(getVal(row, "Mes"))));
                renderUI();
                document.getElementById('loader').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
            }
        });
    }

    function renderUI() {
        const c = document.getElementById('monthChips'); c.innerHTML = '';
        const addBtn = (idx, label, cls) => {
            const b = document.createElement('div'); b.className = 'chip ' + cls;
            b.innerText = label; b.onclick = () => selectMonth(idx, b);
            c.appendChild(b); return b;
        };
        addBtn('annual', 'Anual', 'special');
        currentData.forEach((row, i) => addBtn(i, getVal(row, "Mes"), ''));
        selectMonth(0, c.children[1]);
        lucide.createIcons();
    }

    function selectMonth(idx, el) {
        lastActiveIdx = idx;
        document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
        el.classList.add('active');
        const stats = getActiveStats();
        
        document.getElementById('kpi-receita').innerText = fmt.format(stats.rTotal);
        document.getElementById('kpi-gastos').innerText = fmt.format(stats.gTotal);
        document.getElementById('kpi-invest').innerText = fmt.format(stats.invest);
        document.getElementById('kpi-saldo').innerText = fmt.format(stats.saldo);

        const pG = stats.rTotal > 0 ? (stats.gTotal / stats.rTotal * 100) : 0;
        const pI = stats.rTotal > 0 ? (stats.invest / stats.rTotal * 100) : 0;
        const pS = stats.rTotal > 0 ? (stats.saldo / stats.rTotal * 100) : 0;

        document.getElementById('perc-gastos').innerText = pG.toFixed(1) + '%';
        document.getElementById('bar-gastos').style.width = Math.min(pG, 100) + '%';
        document.getElementById('perc-invest').innerText = pI.toFixed(1) + '%';
        document.getElementById('bar-invest').style.width = Math.min(pI, 100) + '%';
        document.getElementById('perc-saldo').innerText = pS.toFixed(1) + '%';
        document.getElementById('bar-saldo').style.width = Math.min(pS, 100) + '%';

        const analysis = document.getElementById('analysis-text');
        if (pI >= 15) analysis.innerText = "Excelente! Você está investindo uma parte significativa da sua renda.";
        else if (pS > 0) analysis.innerText = "Bom trabalho. O saldo está positivo, tente alocar mais em investimentos.";
        else analysis.innerText = "Atenção: Os gastos superaram a renda ou a margem está muito apertada.";

        updateCharts(idx, stats);
    }

    function updateCharts(activeIdx, stats) {
        const isDark = document.body.getAttribute('data-theme') === 'dark';
        const colorIncome = isDark ? 'rgba(16, 185, 129, 0.2)' : 'rgba(5, 150, 105, 0.15)';
        const colorIncomeActive = isDark ? '#10b981' : '#059669';
        const colorExpActive = isDark ? '#3b82f6' : '#1d4ed8';
        const colorExpInactive = isDark ? 'rgba(59, 130, 246, 0.15)' : 'rgba(37, 99, 235, 0.12)';
        const textColor = isDark ? '#9ca3af' : '#1f2937';
        const gridColor = isDark ? 'rgba(255,255,255,0.05)' : 'rgba(0,0,0,0.08)';

        if(charts.main) charts.main.destroy();
        if(charts.comp) charts.comp.destroy();

        charts.main = new Chart(document.getElementById('mainChart'), {
            type: 'bar',
            data: {
                labels: currentData.map(d => getVal(d, "Mes")),
                datasets: [
                    {
                        label: 'Entrada',
                        data: currentData.map(d => getMonthStats(d).rTotal),
                        backgroundColor: currentData.map((_, i) => i === activeIdx ? colorIncomeActive : colorIncome),
                        borderColor: currentData.map((_, i) => i === activeIdx ? colorIncomeActive : 'transparent'),
                        borderWidth: 1, borderRadius: 4
                    },
                    {
                        label: 'Saída',
                        data: currentData.map(d => getMonthStats(d).gTotal),
                        backgroundColor: currentData.map((_, i) => i === activeIdx ? colorExpActive : colorExpInactive),
                        borderColor: currentData.map((_, i) => i === activeIdx ? colorExpActive : 'transparent'),
                        borderWidth: 1, borderRadius: 4
                    }
                ]
            },
            options: {
                responsive: true, maintainAspectRatio: false,
                plugins: { legend: { labels: { color: textColor, font: { size: 11 } } } },
                scales: { 
                    y: { grid: { color: gridColor }, ticks: { color: textColor, font: { size: 10 } } },
                    x: { grid: { display: false }, ticks: { color: textColor, font: { size: 10, weight: '600' } } }
                }
            }
        });

        charts.comp = new Chart(document.getElementById('compositionChart'), {
            type: 'doughnut',
            data: {
                labels: ['Investimentos', 'Cartões', 'Fixos', 'Outros', 'Saldo'],
                datasets: [{
                    data: [stats.invest, stats.totalCartoes, stats.custosFixos, stats.totalOutros, Math.max(0, stats.saldo)],
                    backgroundColor: ['#3b82f6', '#f59e0b', '#ef4444', '#8b5cf6', '#10b981'],
                    borderWidth: isDark ? 0 : 2, borderColor: '#fff'
                }]
            },
            options: { responsive: true, maintainAspectRatio: false, cutout: '75%', plugins: { legend: { display: false } } }
        });

        const items = [
            {n: 'Investimentos', v: stats.invest, c: '#3b82f6'},
            {n: 'Cartões', v: stats.totalCartoes, c: '#f59e0b'},
            {n: 'Custos Fixos', v: stats.custosFixos, c: '#ef4444'}
        ].sort((a,b) => b.v - a.v);
        
        document.getElementById('composition-list').innerHTML = items.map(f => `
            <div class="category-item">
                <div style="display: flex; align-items: center; gap: 6px;">
                    <div style="width: 6px; height: 6px; border-radius: 50%; background: ${f.c}"></div>
                    <span style="font-size: 0.75rem;">${f.n}</span>
                </div>
                <div style="font-size: 0.75rem; font-weight: 700;">${fmt.format(f.v)}</div>
            </div>
        `).join('');
    }

    window.onload = () => loadYearData('2025');
</script>
</body>
</html>
