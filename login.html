<!DOCTYPE html>
<html lang="pt-br" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | GonçaCRM</title>
    
    <!-- Dependências -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Configuração Tailwind (Mesma do Dashboard) -->
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Plus Jakarta Sans"', 'sans-serif'],
                    },
                    colors: {
                        dark: {
                            900: '#030712',
                            800: '#111827',
                            700: '#1f2937',
                        },
                        brand: {
                            emerald: '#10b981',
                            cyan: '#22d3ee',
                            indigo: '#6366f1',
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #030712;
            color: #f9fafb;
            overflow: hidden;
        }
        
        /* Efeito Glassmorphism */
        .glass {
            background: rgba(17, 24, 39, 0.6);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        /* Animações suaves */
        .fade-in-up {
            animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(20px);
        }

        @keyframes fadeInUp {
            to { opacity: 1; transform: translateY(0); }
        }

        /* Estilos do Mesh Gradient Animado */
        @keyframes blob {
            0% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(5vw, -5vh) scale(1.1); }
            66% { transform: translate(-5vw, 5vh) scale(0.9); }
            100% { transform: translate(0, 0) scale(1); }
        }
        .animate-blob {
            animation: blob 20s infinite alternate ease-in-out;
        }
        .animation-delay-2000 { animation-delay: -5s; }
        .animation-delay-4000 { animation-delay: -10s; }

        /* Custom Input Auto-fill pseudo-class styling for WebKit */
        input:-webkit-autofill,
        input:-webkit-autofill:hover, 
        input:-webkit-autofill:focus, 
        input:-webkit-autofill:active{
            -webkit-box-shadow: 0 0 0 30px #111827 inset !important;
            -webkit-text-fill-color: white !important;
            transition: background-color 5000s ease-in-out 0s;
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen antialiased selection:bg-brand-indigo selection:text-white relative">

    <!-- Fundo Mesh Gradient Animado (Mantendo a continuidade) -->
    <div class="fixed inset-0 z-0 pointer-events-none overflow-hidden">
        <div class="absolute top-[-10%] left-[-10%] w-[50vw] h-[50vw] bg-brand-indigo/30 rounded-full mix-blend-screen filter blur-[100px] animate-blob"></div>
        <div class="absolute top-[20%] right-[-10%] w-[45vw] h-[45vw] bg-brand-emerald/20 rounded-full mix-blend-screen filter blur-[100px] animate-blob animation-delay-2000"></div>
        <div class="absolute bottom-[-20%] left-[20%] w-[60vw] h-[60vw] bg-brand-cyan/20 rounded-full mix-blend-screen filter blur-[100px] animate-blob animation-delay-4000"></div>
        <div class="absolute inset-0 bg-dark-900/60 backdrop-blur-[80px]"></div>
    </div>

    <!-- Container Principal do Login -->
    <main class="relative z-10 w-full max-w-md px-6 fade-in-up">
        
        <!-- Logo e Título -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-gradient-to-br from-brand-indigo to-purple-600 shadow-lg shadow-brand-indigo/20 mb-6 relative group">
                <div class="absolute inset-0 bg-white/20 rounded-2xl opacity-0 group-hover:opacity-100 transition-opacity"></div>
                <i data-lucide="layout-dashboard" class="text-white w-8 h-8"></i>
            </div>
            <h1 class="text-3xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-white to-gray-400 mb-2 tracking-tight">GonçaCRM</h1>
            <p class="text-gray-400 text-sm">Acesse seu workspace unificado</p>
        </div>

        <!-- Card de Login (Glassmorphism) -->
        <div class="glass rounded-3xl p-8 relative overflow-hidden">
            <!-- Brilho sutil no topo do card -->
            <div class="absolute top-0 left-0 right-0 h-px bg-gradient-to-r from-transparent via-brand-indigo/50 to-transparent"></div>

            <form id="loginForm" onsubmit="handleLogin(event)" class="space-y-6">
                
                <!-- Email -->
                <div class="space-y-2">
                    <label for="email" class="text-sm font-medium text-gray-300 ml-1">E-mail corporativo</label>
                    <div class="relative group">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <i data-lucide="mail" class="w-5 h-5 text-gray-500 group-focus-within:text-brand-indigo transition-colors"></i>
                        </div>
                        <input type="email" id="email" name="email" required placeholder="admin@goncacrm.com"
                            class="w-full bg-dark-800/50 border border-dark-600 text-white placeholder-gray-500 text-sm rounded-xl focus:ring-2 focus:ring-brand-indigo/50 focus:border-brand-indigo block pl-11 p-3.5 transition-all outline-none">
                    </div>
                </div>

                <!-- Senha -->
                <div class="space-y-2">
                    <div class="flex items-center justify-between ml-1">
                        <label for="password" class="text-sm font-medium text-gray-300">Senha</label>
                        <a href="#" class="text-xs font-medium text-brand-indigo hover:text-indigo-400 transition-colors">Esqueceu a senha?</a>
                    </div>
                    <div class="relative group">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <i data-lucide="lock" class="w-5 h-5 text-gray-500 group-focus-within:text-brand-indigo transition-colors"></i>
                        </div>
                        <input type="password" id="password" name="password" required placeholder="••••••••"
                            class="w-full bg-dark-800/50 border border-dark-600 text-white placeholder-gray-500 text-sm rounded-xl focus:ring-2 focus:ring-brand-indigo/50 focus:border-brand-indigo block pl-11 p-3.5 transition-all outline-none">
                        
                        <!-- Toggle Password Visibility -->
                        <button type="button" onclick="togglePassword()" class="absolute inset-y-0 right-0 pr-4 flex items-center text-gray-500 hover:text-white transition-colors">
                            <i id="eye-icon" data-lucide="eye" class="w-5 h-5"></i>
                        </button>
                    </div>
                </div>

                <!-- Manter conectado -->
                <div class="flex items-center">
                    <input id="remember" type="checkbox" class="w-4 h-4 rounded bg-dark-800 border-dark-600 text-brand-indigo focus:ring-brand-indigo focus:ring-2 accent-brand-indigo cursor-pointer">
                    <label for="remember" class="ml-2 text-sm text-gray-400 cursor-pointer select-none">Manter conectado por 30 dias</label>
                </div>

                <!-- Botão Submit -->
                <button type="submit" id="submitBtn" class="w-full relative group overflow-hidden rounded-xl bg-brand-indigo hover:bg-indigo-500 text-white font-semibold py-3.5 px-4 transition-all duration-300 hover:shadow-[0_0_20px_rgba(99,102,241,0.4)] flex justify-center items-center h-[52px]">
                    <span id="btnText" class="flex items-center gap-2">
                        Entrar no Workspace <i data-lucide="arrow-right" class="w-4 h-4 group-hover:translate-x-1 transition-transform"></i>
                    </span>
                    
                    <!-- Loading Spinner (Oculto por padrão) -->
                    <span id="btnLoader" class="hidden flex items-center gap-2">
                        <i data-lucide="loader-2" class="w-5 h-5 animate-spin"></i> Autenticando...
                    </span>
                </button>
            </form>
            
            <div class="mt-8 pt-6 border-t border-dark-700/50">
                <p class="text-center text-xs text-gray-500">
                    Acesso restrito a colaboradores autorizados.<br>
                    &copy; 2026 GonçaCRM Inc.
                </p>
            </div>
        </div>
    </main>

    <script>
        // Inicializa os ícones
        lucide.createIcons();

        // Lógica de Mostrar/Ocultar Senha
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const eyeIcon = document.getElementById('eye-icon');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                eyeIcon.setAttribute('data-lucide', 'eye-off');
            } else {
                passwordInput.type = 'password';
                eyeIcon.setAttribute('data-lucide', 'eye');
            }
            lucide.createIcons(); // Recarrega o ícone alterado
        }

        // Lógica de Submissão do Formulário (Simulando Autenticação)
        function handleLogin(event) {
            event.preventDefault(); // Impede o reload da página
            
            const btn = document.getElementById('submitBtn');
            const btnText = document.getElementById('btnText');
            const btnLoader = document.getElementById('btnLoader');
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            // Altera estado do botão para "Carregando"
            btn.disabled = true;
            btn.classList.add('opacity-90', 'cursor-not-allowed');
            btnText.classList.add('hidden');
            btnLoader.classList.remove('hidden');

            // Simula uma chamada de API / Backend (1.5 segundos de delay)
            setTimeout(() => {
                // Aqui você pode adicionar lógica real de validação
                // Por enquanto, qualquer login válido redireciona para o dashboard
                
                if(email && password) {
                    // Redireciona para o index.html (Dashboard)
                    window.location.href = 'index.html';
                } else {
                    // Restaura o botão caso dê erro (apenas redundância, pois os campos têm 'required')
                    btn.disabled = false;
                    btn.classList.remove('opacity-90', 'cursor-not-allowed');
                    btnText.classList.remove('hidden');
                    btnLoader.classList.add('hidden');
                }
            }, 1500);
        }
    </script>
</body>
</html>
