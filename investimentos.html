<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Investimentos do Gonça | Premium Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-primary: #6366f1;
            --brand-secondary: #f59e0b;
            --brand-success: #10b981;
            --brand-danger: #ef4444;
            --bg-light: #f8fafc;
            --card-light: #ffffff;
            --text-light: #0f172a;
            --bg-dark: #0b0f1a;
            --card-dark: #161e31;
            --text-dark: #f1f5f9;
        }

        * { font-family: 'Plus Jakarta Sans', sans-serif; transition: background-color 0.3s, border-color 0.3s; }
        
        body.light-mode { background-color: var(--bg-light); color: var(--text-light); }
        body.dark-mode { background-color: var(--bg-dark); color: var(--text-dark); }

        .glass-card {
            border-radius: 1.25rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 20px -2px rgba(0, 0, 0, 0.05);
        }
        .light-mode .glass-card { background-color: var(--card-light); }
        .dark-mode .glass-card { background-color: var(--card-dark); border-color: rgba(255, 255, 255, 0.05); }

        .btn-filter {
            padding: 0.5rem 1rem; border-radius: 0.75rem; font-weight: 600; font-size: 0.75rem;
            transition: all 0.2s; border: 1px solid #e2e8f0; background: white; color: #64748b;
        }
        .dark-mode .btn-filter { background: #1e293b; border-color: #334155; color: #94a3b8; }
        .btn-filter.active { background: var(--brand-primary); color: white; border-color: var(--brand-primary); }

        .search-input {
            width: 100%; padding: 0.6rem 1rem 0.6rem 2.5rem; border-radius: 0.75rem;
            border: 1px solid #e2e8f0; outline: none; font-size: 0.875rem;
        }
        .dark-mode .search-input { background: #1e293b; border-color: #334155; color: white; }

        .theme-toggle-wrapper { background: #e2e8f0; padding: 4px; border-radius: 50px; display: flex; align-items: center; gap: 4px; }
        .dark-mode .theme-toggle-wrapper { background: #1e293b; }
        .theme-icon { padding: 4px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .theme-icon.active { background: white; }
        .dark-mode .theme-icon.active { background: #334155; }

        #loading-overlay {
            position: fixed; inset: 0; background: var(--bg-light);
            display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1000;
        }
        .dark-mode #loading-overlay { background: var(--bg-dark); }
        
        th.sortable { cursor: pointer; user-select: none; }
        th.sortable:hover { color: var(--brand-primary); }
        .sort-icon { display: inline-block; width: 12px; margin-left: 4px; color: #cbd5e1; }
    </style>
</head>
<body class="dark-mode"> <div id="loading-overlay">
        <div class="w-12 h-12 border-4 border-indigo-200 border-t-indigo-600 rounded-full animate-spin mb-4"></div>
        <div class="text-lg font-bold text-slate-700 dark:text-slate-200">Sincronizando dados do Google Sheets...</div>
    </div>

    <nav class="max-w-7xl mx-auto p-6 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center shadow-lg">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6" />
                </svg>
            </div>
            <div>
                <h1 class="text-xl font-extrabold tracking-tight text-slate-900 dark:text-white">Gonça<span class="text-indigo-600">Invest</span></h1>
            </div>
        </div>
        
        <div class="theme-toggle-wrapper">
            <div id="sun-icon" class="theme-icon" onclick="setTheme('light')">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707M16.071 16.071l.707.707M7.657 7.657l.707.707M12 8a4 4 0 100 8 4 4 0 000-8z" /></svg>
            </div>
            <div id="moon-icon" class="theme-icon active" onclick="setTheme('dark')">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" /></svg>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 pb-20">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
            <div class="glass-card p-6 border-l-4 border-indigo-500">
                <p class="text-slate-400 text-xs font-bold uppercase tracking-widest mb-1">Patrimônio Atual</p>
                <h2 id="kpi-total-patrimonio" class="text-3xl font-extrabold">R$ 0,00</h2>
            </div>
            <div class="glass-card p-6 border-l-4 border-amber-500">
                <p class="text-slate-400 text-xs font-bold uppercase tracking-widest mb-1">Total Investido</p>
                <h2 id="kpi-total-investido" class="text-3xl font-extrabold">R$ 0,00</h2>
            </div>
            <div id="kpi-lucro-card" class="glass-card p-6 border-l-4 border-emerald-500">
                <p class="text-slate-400 text-xs font-bold uppercase tracking-widest mb-1">Resultado Líquido</p>
                <h2 id="kpi-total-proventos" class="text-3xl font-extrabold">R$ 0,00</h2>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8 mb-10">
            <div class="glass-card p-6">
                <h3 class="text-xs font-black text-slate-500 uppercase mb-6">Alocação por Ativo</h3>
                <div class="h-64"><canvas id="doughnutChart"></canvas></div>
            </div>
            <div class="glass-card p-6">
                <h3 class="text-xs font-black text-slate-500 uppercase mb-6">Concentração (R$)</h3>
                <div class="h-64"><canvas id="barChart"></canvas></div>
            </div>
            <div class="glass-card p-6">
                <h3 class="text-xs font-black text-slate-500 uppercase mb-6">Investido vs Atual</h3>
                <div class="h-64"><canvas id="comparisonChart"></canvas></div>
            </div>
        </div>

        <div class="glass-card overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead>
                        <tr class="text-[10px] uppercase font-black text-slate-400 border-b border-slate-800">
                            <th class="py-4 px-6 sortable" onclick="sortTable('ativo')">Ativo <span id="sort-icon-ativo"></span></th>
                            <th class="py-4 px-2 text-right sortable" onclick="sortTable('pMedio')">P. Médio</th>
                            <th class="py-4 px-2 text-right sortable" onclick="sortTable('pAtual')">P. Atual</th>
                            <th class="py-4 px-2 text-right sortable" onclick="sortTable('atual')">Valor Total</th>
                            <th class="py-4 px-2 text-right sortable" onclick="sortTable('peso')">Peso (%)</th>
                            <th class="py-4 px-6 text-right sortable" onclick="sortTable('lucro')">Resultado</th>
                        </tr>
                    </thead>
                    <tbody id="table-body" class="divide-y divide-slate-800/50 text-sm"></tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTJFWclSmOeIDQwo5VepSJ5_XG-t-0OVr4FhWsVlmUA4t5wEk-bjTbZdOD1cXGcGnnZ6IBm2vGVZ8HQ/pub?gid=1550358623&single=true&output=csv';
        let fullData = [];
        let charts = {};
        let currentSortColumn = 'atual';
        let isSortAscending = false;

        async function fetchData() {
            Papa.parse(CSV_URL, {
                download: true, header: true, skipEmptyLines: 'greedy',
                complete: (results) => {
                    processData(results.data, results.meta.fields);
                    document.getElementById('loading-overlay').style.display = 'none';
                }
            });
        }

        function parseNumeric(val) {
            if (!val) return 0;
            let str = val.toString().replace(/R\$|\s|%/g, '').replace(/\./g, '').replace(',', '.');
            return parseFloat(str) || 0;
        }

        function processData(data, fields) {
            fullData = data.filter(row => row[fields[0]] && !row[fields[0]].toLowerCase().includes('total'))
            .map(row => {
                const inv = parseNumeric(row[fields[9]]);
                const atu = parseNumeric(row[fields[10]]);
                return {
                    ativo: row[fields[0]].trim().toUpperCase(),
                    pMedio: parseNumeric(row[fields[4]]),
                    pAtual: parseNumeric(row[fields[5]]),
                    investido: inv,
                    atual: atu,
                    lucro: atu - inv
                };
            });
            updateUI();
        }

        function updateUI() {
            const totalPatrimonio = fullData.reduce((acc, curr) => acc + curr.atual, 0);
            fullData.forEach(d => d.peso = (d.atual / totalPatrimonio) * 100);
            
            document.getElementById('kpi-total-patrimonio').innerText = totalPatrimonio.toLocaleString('pt-BR', {style:'currency', currency:'BRL'});
            renderTable();
            renderCharts();
        }

        function sortTable(col) {
            if (currentSortColumn === col) isSortAscending = !isSortAscending;
            else { currentSortColumn = col; isSortAscending = false; }
            renderTable();
        }

        function renderTable() {
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = '';
            
            const sorted = [...fullData].sort((a,b) => isSortAscending ? a[currentSortColumn] - b[currentSortColumn] : b[currentSortColumn] - a[currentSortColumn]);

            sorted.forEach(d => {
                const precoClass = d.pAtual >= d.pMedio ? 'text-emerald-500' : 'text-rose-500';
                tbody.innerHTML += `
                    <tr class="hover:bg-slate-800/40">
                        <td class="py-4 px-6 font-bold">${d.ativo}</td>
                        <td class="py-4 px-2 text-right">R$ ${d.pMedio.toFixed(2)}</td>
                        <td class="py-4 px-2 text-right ${precoClass}">R$ ${d.pAtual.toFixed(2)}</td>
                        <td class="py-4 px-2 text-right font-bold text-white">R$ ${d.atual.toFixed(2)}</td>
                        <td class="py-4 px-2 text-right text-xs font-bold">${d.peso.toFixed(1)}%</td>
                        <td class="py-4 px-6 text-right font-bold ${d.lucro >= 0 ? 'text-emerald-500' : 'text-rose-500'}">R$ ${d.lucro.toFixed(2)}</td>
                    </tr>`;
            });
        }

        function renderCharts() {
            const colors = ['#6366f1', '#8b5cf6', '#ec4899', '#f43f5e', '#f97316', '#10b981'];
            if(charts.doughnut) charts.doughnut.destroy();
            charts.doughnut = new Chart(document.getElementById('doughnutChart'), {
                type: 'doughnut',
                data: {
                    labels: fullData.map(d => d.ativo),
                    datasets: [{ data: fullData.map(d => d.atual), backgroundColor: colors }]
                },
                options: { cutout: '70%', plugins: { legend: { display: false } } }
            });
            // Adicione os outros gráficos conforme necessário
        }

        function setTheme(t) { document.body.className = t + '-mode'; }
        window.onload = fetchData;
    </script>
</body>
</html>
